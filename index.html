<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>KITT</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0a;--red:#e03030;--red-dim:#801818;--amber:#ff9500;
  --green:#30d060;--cyan:#00e5ff;--text:#e8e8e8;--text-dim:#666;
  --card:#141414;--border:#222;--overlay-bg:rgba(10,10,10,0.92);
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Orbitron',monospace;-webkit-tap-highlight-color:transparent;touch-action:manipulation}

/* === Tab Bar === */
#tab-bar{display:flex;height:44px;background:#111;border-bottom:1px solid var(--border);position:relative;z-index:100}
.tab{flex:1;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);cursor:pointer;transition:color .2s,border-color .2s;border-bottom:2px solid transparent;user-select:none}
.tab.active{color:var(--red);border-bottom-color:var(--red)}
.tab:active{opacity:.7}

/* === Panels === */
#panels{position:relative;height:calc(100% - 44px);overflow:hidden}
.panel{position:absolute;inset:0;display:none;flex-direction:column}
.panel.active{display:flex}

/* === KITT Panel === */
#kitt-panel{background:var(--bg);align-items:center;justify-content:center}
#kitt-status{position:absolute;top:8px;left:12px;font-size:9px;letter-spacing:1px;color:var(--text-dim)}
#kitt-status .online{color:var(--green)}
#kitt-status .error{color:var(--red)}

#scanner-wrap{width:200px;height:12px;background:#1a0000;border-radius:6px;overflow:hidden;position:relative;margin-bottom:20px}
#scanner-bar{width:40%;height:100%;background:linear-gradient(90deg,transparent,var(--red),transparent);position:absolute;left:0;animation:scan 2s ease-in-out infinite alternate;border-radius:6px}
@keyframes scan{0%{left:-10%}100%{left:70%}}
#scanner-wrap.paused #scanner-bar{animation-play-state:paused;opacity:.3}

#kitt-label{font-size:28px;font-weight:900;letter-spacing:8px;margin-bottom:8px}
#kitt-sub{font-size:10px;color:var(--text-dim);letter-spacing:2px;margin-bottom:24px}

#gemini-btn{width:64px;height:64px;border-radius:50%;border:2px solid var(--red-dim);background:rgba(224,48,48,.08);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .3s}
#gemini-btn:active{transform:scale(.9)}
#gemini-btn.connected{border-color:var(--green);background:rgba(48,208,96,.1);box-shadow:0 0 20px rgba(48,208,96,.2)}
#gemini-btn.connecting{border-color:var(--amber);animation:pulse-border 1s infinite}
@keyframes pulse-border{0%,100%{border-color:var(--amber)}50%{border-color:transparent}}
#gemini-btn svg{width:28px;height:28px;fill:var(--red)}
#gemini-btn.connected svg{fill:var(--green)}

#gemini-status{font-size:9px;color:var(--text-dim);margin-top:12px;letter-spacing:1px;height:14px}

/* === YouTube Panel === */
#yt-panel{background:#000}
#yt-search-bar{display:flex;padding:6px;gap:6px;background:#111;border-bottom:1px solid var(--border)}
#yt-search-bar input{flex:1;background:#1a1a1a;border:1px solid var(--border);border-radius:4px;padding:6px 10px;color:var(--text);font-family:'Orbitron',monospace;font-size:11px;outline:none}
#yt-search-bar input:focus{border-color:var(--red)}
#yt-search-bar button{background:var(--red);border:none;border-radius:4px;padding:6px 14px;color:#fff;font-family:'Orbitron',monospace;font-size:10px;font-weight:700;cursor:pointer;letter-spacing:1px}
#yt-player-wrap{flex:1;position:relative;background:#000}
#yt-player{width:100%;height:100%}
#yt-overlay{display:none;position:absolute;bottom:0;left:0;right:0;padding:10px;background:linear-gradient(transparent,rgba(0,0,0,.85));pointer-events:none}
#yt-now-playing{font-size:10px;color:var(--text-dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#yt-placeholder{flex:1;display:flex;flex-direction:column;align-items:center;color:var(--text-dim);font-size:11px;gap:8px;padding:12px;text-align:center;overflow-y:auto;-webkit-overflow-scrolling:touch}
#yt-placeholder.hidden{display:none}
#yt-history{margin-top:12px;width:100%;max-width:320px}
.yt-hist-item{padding:8px;border:1px solid var(--border);border-radius:4px;margin-bottom:4px;cursor:pointer;font-size:10px;color:var(--text-dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.yt-hist-item:active{background:#1a1a1a}
#yt-search-results{width:100%;max-width:100%;padding:0 4px}
.yt-result{display:flex;flex-direction:column;padding:0;border:none;border-radius:8px;margin-bottom:16px;cursor:pointer;overflow:hidden;background:var(--card)}
.yt-result:active{opacity:.8}
.yt-result img{width:100%;aspect-ratio:16/9;object-fit:cover;border-radius:0;flex-shrink:0}
.yt-result-info{padding:8px 10px 10px}
.yt-result-title{font-size:12px;color:var(--text);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;font-family:-apple-system,sans-serif}
.yt-result-ch{font-size:10px;color:var(--text-dim);margin-top:4px;font-family:-apple-system,sans-serif}
.yt-searching{text-align:center;font-size:10px;color:var(--amber);padding:12px}

/* === SoundCloud Panel === */
#sc-panel{align-items:center;justify-content:center;color:var(--text-dim);font-size:12px;letter-spacing:2px}

/* === Offer Overlay === */
#offer-overlay{display:none;position:fixed;inset:0;z-index:200;background:var(--overlay-bg);flex-direction:column;align-items:center;justify-content:center;animation:fade-in .3s}
@keyframes fade-in{from{opacity:0}to{opacity:1}}
#offer-overlay.accept{border:3px solid var(--green)}
#offer-overlay.reject{border:3px solid var(--red)}
#offer-decision{font-size:36px;font-weight:900;letter-spacing:6px;margin-bottom:8px}
#offer-decision.accept{color:var(--green)}
#offer-decision.reject{color:var(--red)}
#offer-hourly{font-size:18px;font-weight:700;margin-bottom:4px}
#offer-detail{font-size:11px;color:var(--text-dim);margin-bottom:4px;text-align:center;line-height:1.6}
#offer-reason{font-size:10px;color:var(--amber);margin-bottom:16px;text-align:center;max-width:280px}
#offer-dismiss{padding:10px 32px;border:1px solid var(--border);border-radius:4px;background:transparent;color:var(--text-dim);font-family:'Orbitron',monospace;font-size:10px;cursor:pointer;letter-spacing:2px}

/* === Settings === */
#settings-overlay{display:none;position:fixed;inset:0;z-index:300;background:var(--overlay-bg);padding:20px;overflow-y:auto}
#settings-overlay.show{display:block}
#settings-overlay h2{font-size:14px;letter-spacing:3px;margin-bottom:16px;color:var(--red)}
.setting-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);font-size:10px}
.setting-row label{color:var(--text-dim);letter-spacing:1px}
.setting-row input[type=text],.setting-row input[type=number]{background:#1a1a1a;border:1px solid var(--border);border-radius:4px;padding:4px 8px;color:var(--text);font-family:'Orbitron',monospace;font-size:10px;width:120px;text-align:right}
#settings-close{margin-top:16px;padding:8px 24px;border:1px solid var(--border);background:transparent;color:var(--text-dim);font-family:'Orbitron',monospace;font-size:10px;cursor:pointer;border-radius:4px;letter-spacing:2px}
#api-key-input{width:200px!important;font-size:9px!important}

/* === Log === */
.yt-load-more{width:100%;padding:14px;margin:8px 0 20px;border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--text-dim);font-family:'Orbitron',monospace;font-size:11px;cursor:pointer;text-align:center;letter-spacing:1px}
.yt-load-more:active{background:#222}
#yt-intro.hidden{display:none}
#log-bar{position:fixed;bottom:0;left:0;right:0;height:20px;background:#0d0d0d;border-top:1px solid var(--border);display:flex;align-items:center;padding:0 8px;font-size:8px;color:var(--text-dim);z-index:50;overflow:hidden}
</style>
</head>
<body>

<!-- Tab Bar -->
<div id="tab-bar">
  <div class="tab active" data-panel="kitt">KITT</div>
  <div class="tab" data-panel="yt">YouTube</div>
  <div class="tab" data-panel="sc">SoundCloud</div>
  <div class="tab" style="flex:0 0 36px;font-size:14px" onclick="toggleSettings()">⚙</div>
</div>

<!-- Panels -->
<div id="panels">
  <!-- KITT Panel -->
  <div id="kitt-panel" class="panel active">
    <div id="kitt-status"><span id="fb-status">OFFLINE</span> · Firebase <span id="fb-latency">--</span></div>
    <div id="scanner-wrap"><div id="scanner-bar"></div></div>
    <div id="kitt-label">KITT</div>
    <div id="kitt-sub">UBER EATS AI JUDGE</div>
    <div id="gemini-btn" onclick="toggleGemini()">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
    </div>
    <div id="gemini-status">タップして起動</div>
  </div>

  <!-- YouTube Panel -->
  <div id="yt-panel" class="panel">
    <div id="yt-search-bar">
      <input type="text" id="yt-input" placeholder="YouTubeを検索 / URLを貼り付け" enterkeyhint="search">
      <button onclick="ytSearch()">▶</button>
    </div>
    <div id="yt-placeholder">
      <div id="yt-intro"><div>▶ YouTube</div>
      <div style="font-size:9px">検索またはURLで再生開始</div></div>
      <div id="yt-search-results"></div>
      <div id="yt-history"></div>
    </div>
    <div id="yt-player-wrap" style="display:none">
      <div id="yt-player"></div>
      <div id="yt-overlay"><div id="yt-now-playing"></div></div>
    </div>
  </div>

  <!-- SoundCloud Panel -->
  <div id="sc-panel" class="panel">COMING SOON</div>
</div>

<!-- Offer Overlay -->
<div id="offer-overlay">
  <div id="offer-decision"></div>
  <div id="offer-hourly"></div>
  <div id="offer-detail"></div>
  <div id="offer-reason"></div>
  <button id="offer-dismiss" onclick="dismissOffer()">OK</button>
</div>

<!-- Settings -->
<div id="settings-overlay">
  <h2>⚙ SETTINGS</h2>
  <div class="setting-row"><label>GEMINI API KEY</label><input type="text" id="api-key-input"></div>
  <div class="setting-row"><label>FIREBASE URL</label><input type="text" id="fb-url-input" value=""></div>
  <div class="setting-row"><label>POLLING SEC</label><input type="number" id="poll-sec-input" value="3" min="1" max="30"></div>
  <div class="setting-row"><label>AUTO DISCONNECT SEC</label><input type="number" id="auto-dc-input" value="120" min="30" max="600"></div>
  <div class="setting-row"><label>YT DUCK VOLUME</label><input type="number" id="duck-vol-input" value="5" min="0" max="100"></div>
  <div class="setting-row"><label>YT NORMAL VOLUME</label><input type="number" id="normal-vol-input" value="70" min="0" max="100"></div>
  <button id="settings-close" onclick="saveSettings()">SAVE & CLOSE</button>
</div>

<!-- Log Bar -->
<div id="log-bar"><span id="log-text">KITT YouTube Edition v1.0 ready</span></div>

<!-- Keepalive silent audio (background Firebase polling survival) -->
<audio id="keepalive" loop playsinline>
  <source src="data:audio/mp3;base64,SUQzBAAAAAAAI1RTU0UAAAAPAAADTGF2ZjU4Ljc2LjEwMAAAAAAAAAAAAAAA//tQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAWGluZwAAAA8AAAACAAABhgC7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7//////////////////////////////////////////////////////////////////8AAAAATGF2YzU4LjEzAAAAAAAAAAAAAAAAJAAAAAAAAAAAAYYAAAAAAAAAAAAAAAAAAAAA//tQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAWGluZwAAAA8AAAACAAABhgC7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7//////////////////////////////////////////////////////////////////8AAAAATGF2YzU4LjEzAAAAAAAAAAAAAAAAJAAAAAAAAAAAAYYAAAAAAAAAAAAAAAAA" type="audio/mp3">
</audio>

<!-- YouTube IFrame API -->
<script>
// ============================================================
// Config & State
// ============================================================
const DEFAULT_CONFIG = {
  geminiApiKey: '',
  firebaseUrl: 'https://ubereats-kitt-default-rtdb.asia-southeast1.firebasedatabase.app',
  pollingSec: 3,
  autoDisconnectSec: 120,
  duckVolume: 5,
  normalVolume: 70
};

let config = {...DEFAULT_CONFIG};
let state = {
  activePanel: 'kitt',
  geminiWs: null,
  geminiConnected: false,
  geminiConnecting: false,
  firebasePolling: null,
  lastOfferTimestamp: null,
  ytPlayer: null,
  ytReady: false,
  ytPlaying: false,
  ytCurrentVolume: 70,
  offerVisible: false,
  autoDisconnectTimer: null,
  geminiSessionStart: null,
  ytHistory: [],
  ytContinuation: null,
  ytLastQuery: null
};

// Load saved config
try {
  const saved = JSON.parse(localStorage.getItem('kitt-yt-config') || '{}');
  config = {...DEFAULT_CONFIG, ...saved};
} catch(e) {}

// Load YT history
try {
  state.ytHistory = JSON.parse(localStorage.getItem('kitt-yt-history') || '[]');
} catch(e) {}

// ============================================================
// Tab Navigation
// ============================================================
document.querySelectorAll('.tab[data-panel]').forEach(tab => {
  tab.addEventListener('click', () => {
    const panel = tab.dataset.panel;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById(panel + '-panel').classList.add('active');
    state.activePanel = panel;
  });
});

// ============================================================
// Settings
// ============================================================
function toggleSettings() {
  const el = document.getElementById('settings-overlay');
  if (el.classList.contains('show')) {
    saveSettings();
  } else {
    document.getElementById('api-key-input').value = config.geminiApiKey;
    document.getElementById('fb-url-input').value = config.firebaseUrl;
    document.getElementById('poll-sec-input').value = config.pollingSec;
    document.getElementById('auto-dc-input').value = config.autoDisconnectSec;
    document.getElementById('duck-vol-input').value = config.duckVolume;
    document.getElementById('normal-vol-input').value = config.normalVolume;
    el.classList.add('show');
  }
}
function saveSettings() {
  config.geminiApiKey = document.getElementById('api-key-input').value.trim();
  config.firebaseUrl = document.getElementById('fb-url-input').value.trim();
  config.pollingSec = parseInt(document.getElementById('poll-sec-input').value) || 3;
  config.autoDisconnectSec = parseInt(document.getElementById('auto-dc-input').value) || 120;
  config.duckVolume = parseInt(document.getElementById('duck-vol-input').value) || 5;
  config.normalVolume = parseInt(document.getElementById('normal-vol-input').value) || 70;
  try { localStorage.setItem('kitt-yt-config', JSON.stringify(config)); } catch(e) {}
  document.getElementById('settings-overlay').classList.remove('show');
  log('Settings saved');
}

// ============================================================
// Logging
// ============================================================
function log(msg) {
  const el = document.getElementById('log-text');
  const t = new Date().toLocaleTimeString('ja-JP', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  el.textContent = `[${t}] ${msg}`;
  console.log(`[KITT] ${msg}`);
}

// ============================================================
// Firebase RTDB Polling
// ============================================================
function startFirebasePolling() {
  if (state.firebasePolling) return;
  log('Firebase polling started');
  pollFirebase(); // immediate first poll
  state.firebasePolling = setInterval(pollFirebase, config.pollingSec * 1000);
}

function stopFirebasePolling() {
  if (state.firebasePolling) {
    clearInterval(state.firebasePolling);
    state.firebasePolling = null;
    log('Firebase polling stopped');
  }
}

async function pollFirebase() {
  const t0 = Date.now();
  try {
    const resp = await fetch(config.firebaseUrl + '/offer_tts.json');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    const latency = Date.now() - t0;
    updateFirebaseStatus('online', latency);

    if (!data || !data.timestamp) return;
    if (data.timestamp === state.lastOfferTimestamp) return;

    // New offer detected!
    state.lastOfferTimestamp = data.timestamp;
    log('NEW OFFER detected');
    handleNewOffer(data);
  } catch (e) {
    updateFirebaseStatus('error', null);
    log('Firebase error: ' + e.message);
  }
}

function updateFirebaseStatus(status, latency) {
  const el = document.getElementById('fb-status');
  const latEl = document.getElementById('fb-latency');
  el.textContent = status === 'online' ? 'ONLINE' : 'ERROR';
  el.className = status;
  latEl.textContent = latency ? latency + 'ms' : '--';
}

// ============================================================
// Offer Handling
// ============================================================
function handleNewOffer(data) {
  // Parse offer data - support both structured and legacy format
  let offer, context;
  if (data.offer) {
    offer = data.offer;
    context = data.context || {};
  } else {
    // Legacy: {text, timestamp}
    offer = { reason: data.text || '' };
    context = {};
  }

  const decision = (offer.decision || '').toLowerCase();
  const isAccept = decision === 'accept';

  // 1. Duck YouTube volume
  duckYouTubeVolume();

  // 2. Show overlay
  showOfferOverlay(offer, isAccept);

  // 3. Send to Gemini for voice report (if connected)
  if (state.geminiConnected) {
    sendOfferToGemini(offer, context);
    resetAutoDisconnect(); // reset timer on new offer
  }

  // 4. Play keepalive to prevent suspension
  tryPlayKeepalive();
}

function showOfferOverlay(offer, isAccept) {
  const overlay = document.getElementById('offer-overlay');
  const decEl = document.getElementById('offer-decision');
  const hourlyEl = document.getElementById('offer-hourly');
  const detailEl = document.getElementById('offer-detail');
  const reasonEl = document.getElementById('offer-reason');

  overlay.className = isAccept ? 'accept' : 'reject';
  decEl.className = isAccept ? 'accept' : 'reject';
  decEl.textContent = isAccept ? 'ACCEPT' : 'REJECT';

  const hourly = offer.estimated_hourly_rate || offer.hourly || 0;
  hourlyEl.textContent = hourly > 0 ? `¥${Math.round(hourly).toLocaleString()}/h` : '';

  const parts = [];
  if (offer.store_name) parts.push(offer.store_name);
  if (offer.reward) parts.push(`¥${offer.reward}`);
  if (offer.distance_km) parts.push(`${offer.distance_km}km`);
  if (offer.duration_min) parts.push(`${offer.duration_min}分`);
  detailEl.textContent = parts.join(' · ');

  reasonEl.textContent = offer.reason || '';

  overlay.style.display = 'flex';
  state.offerVisible = true;
}

function dismissOffer() {
  document.getElementById('offer-overlay').style.display = 'none';
  state.offerVisible = false;
  restoreYouTubeVolume();
}

// ============================================================
// YouTube Volume Ducking
// ============================================================
function duckYouTubeVolume() {
  if (!state.ytPlayer || !state.ytReady) return;
  try {
    state.ytCurrentVolume = state.ytPlayer.getVolume();
    // Smooth fade
    const current = state.ytCurrentVolume;
    const target = config.duckVolume;
    const steps = 8;
    const stepSize = (current - target) / steps;
    let step = 0;
    const fadeInterval = setInterval(() => {
      step++;
      const vol = Math.round(current - stepSize * step);
      try { state.ytPlayer.setVolume(Math.max(vol, target)); } catch(e) {}
      if (step >= steps) clearInterval(fadeInterval);
    }, 50);
    log(`YT volume ducking ${current} → ${target}`);
  } catch(e) { log('YT duck error: ' + e.message); }
}

function restoreYouTubeVolume() {
  if (!state.ytPlayer || !state.ytReady) return;
  try {
    const target = state.ytCurrentVolume || config.normalVolume;
    const current = state.ytPlayer.getVolume();
    const steps = 10;
    const stepSize = (target - current) / steps;
    let step = 0;
    const fadeInterval = setInterval(() => {
      step++;
      const vol = Math.round(current + stepSize * step);
      try { state.ytPlayer.setVolume(Math.min(vol, target)); } catch(e) {}
      if (step >= steps) clearInterval(fadeInterval);
    }, 80);
    log(`YT volume restoring → ${target}`);
  } catch(e) { log('YT restore error: ' + e.message); }
}

// ============================================================
// YouTube Player
// ============================================================
let ytApiReady = false;
function onYouTubeIframeAPIReady() {
  ytApiReady = true;
  log('YouTube IFrame API ready');
}

function initYtPlayer(videoId) {
  const wrap = document.getElementById('yt-player-wrap');
  const placeholder = document.getElementById('yt-placeholder');
  wrap.style.display = 'flex';
  placeholder.classList.add('hidden');

  if (state.ytPlayer) {
    try { state.ytPlayer.destroy(); } catch(e) {}
  }
  document.getElementById('yt-player').innerHTML = '';

  // Create a div for the player
  const div = document.createElement('div');
  div.id = 'yt-player-inner';
  div.style.cssText = 'width:100%;height:100%';
  document.getElementById('yt-player').appendChild(div);

  state.ytPlayer = new YT.Player('yt-player-inner', {
    videoId: videoId,
    playerVars: {
      autoplay: 1,
      playsinline: 1,
      modestbranding: 1,
      rel: 0,
      fs: 0
    },
    events: {
      onReady: (e) => {
        state.ytReady = true;
        e.target.setVolume(config.normalVolume);
        log('YT player ready: ' + videoId);
      },
      onStateChange: (e) => {
        state.ytPlaying = e.data === YT.PlayerState.PLAYING;
      }
    }
  });
}

async function ytSearch() {
  const input = document.getElementById('yt-input').value.trim();
  if (!input && !state.ytContinuation) return;

  // Check if it's a YouTube URL
  const videoId = extractYtVideoId(input);
  if (videoId) {
    playYtVideo(videoId, input);
    return;
  }

  // Search via Piped API (free, no API key needed)
  const resultsEl = document.getElementById('yt-search-results');
  resultsEl.innerHTML = '<div class="yt-searching">検索中...</div>';
  document.getElementById('yt-input').value = '';
  document.getElementById('yt-intro').classList.add('hidden');
  log('Searching: ' + input);

  const cfSearchUrl = 'https://asia-northeast1-gen-lang-client-0549297663.cloudfunctions.net/ytSearch';
  const isLoadMore = state.ytContinuation && input === '';
  const query = isLoadMore ? state.ytLastQuery : input;
  
  if (!isLoadMore) {
    resultsEl.innerHTML = '<div class="yt-searching">\u691c\u7d22\u4e2d...</div>';
    state.ytContinuation = null;
    state.ytLastQuery = query;
  }
  document.getElementById('yt-input').value = '';
  document.getElementById('yt-intro').classList.add('hidden');
  log('Searching: ' + query + (isLoadMore ? ' (more)' : ''));
  try {
    let url = cfSearchUrl + '?q=' + encodeURIComponent(query);
    if (isLoadMore && state.ytContinuation) {
      url += '&continuation=' + encodeURIComponent(state.ytContinuation);
    }
    const resp = await fetch(url);
    if (resp.ok) {
      const data = await resp.json();
      const items = data.results || [];
      state.ytContinuation = data.continuation || null;
      if (items.length === 0 && !isLoadMore) {
        resultsEl.innerHTML = '<div class="yt-searching">\u7d50\u679c\u306a\u3057</div>';
        return;
      }
      const html = items.map(item => {
        const vid = item.videoId || '';
        const thumb = item.thumbnail || '';
        const title = (item.title || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
        const ch = item.channel || '';
        const dur = item.duration || '';
        return `<div class="yt-result" onclick="playYtVideo('${vid}','${title}')">
          <div style="position:relative">
            <img src="${thumb}" loading="lazy" onerror="this.style.display='none'">
            ${dur ? `<span style="position:absolute;bottom:4px;right:4px;background:rgba(0,0,0,.8);color:#fff;font-size:10px;padding:1px 4px;border-radius:2px;font-family:-apple-system,sans-serif">${dur}</span>` : ''}
          </div>
          <div class="yt-result-info">
            <div class="yt-result-title">${item.title || ''}</div>
            <div class="yt-result-ch">${ch}</div>
          </div>
        </div>`;
      }).join('');
      const loadMoreBtn = state.ytContinuation 
        ? '<button class="yt-load-more" onclick="ytLoadMore()">\u25bc \u3082\u3063\u3068\u898b\u308b</button>' 
        : '';
      // Remove old load-more button before appending
      const oldBtn = resultsEl.querySelector('.yt-load-more');
      if (oldBtn) oldBtn.remove();
      if (isLoadMore) {
        resultsEl.insertAdjacentHTML('beforeend', html + loadMoreBtn);
      } else {
        resultsEl.innerHTML = html + loadMoreBtn;
      }
      log(items.length + ' results' + (state.ytContinuation ? ' (more available)' : ''));
      return;
    }
  } catch(e) {
    log('Search error: ' + e.message);
  }
  if (!isLoadMore) resultsEl.innerHTML = '<div class="yt-searching">\u691c\u7d22\u5931\u6557</div>'
    document.head.appendChild(tag);
    // Wait for API
    const check = setInterval(() => {
      if (ytApiReady) {
        clearInterval(check);
        initYtPlayer(videoId);
      }
    }, 200);
  }

  // Save to history
  const entry = { videoId, title: title || videoId, time: Date.now() };
  state.ytHistory = [entry, ...state.ytHistory.filter(h => h.videoId !== videoId)].slice(0, 10);
  try { localStorage.setItem('kitt-yt-history', JSON.stringify(state.ytHistory)); } catch(e) {}
  renderYtHistory();
  document.getElementById('yt-search-results').innerHTML = '';
  document.getElementById('yt-input').value = '';
}

function ytLoadMore() {
  if (!state.ytContinuation) return;
  // Temporarily clear input so ytSearch uses continuation mode
  const inp = document.getElementById('yt-input');
  inp.value = '';
  ytSearch();
}

function extractYtVideoId(input) {
  // youtube.com/watch?v=ID
  let m = input.match(/[?&]v=([a-zA-Z0-9_-]{11})/);
  if (m) return m[1];
  // youtu.be/ID
  m = input.match(/youtu\.be\/([a-zA-Z0-9_-]{11})/);
  if (m) return m[1];
  // youtube.com/embed/ID
  m = input.match(/youtube\.com\/embed\/([a-zA-Z0-9_-]{11})/);
  if (m) return m[1];
  // youtube.com/shorts/ID
  m = input.match(/youtube\.com\/shorts\/([a-zA-Z0-9_-]{11})/);
  if (m) return m[1];
  // Raw 11-char ID
  if (/^[a-zA-Z0-9_-]{11}$/.test(input)) return input;
  return null;
}

function renderYtHistory() {
  const el = document.getElementById('yt-history');
  el.innerHTML = state.ytHistory.map(h =>
    `<div class="yt-hist-item" onclick="playYtVideo('${h.videoId}','${(h.title||'').replace(/'/g,'\\\'')}')">${h.title || h.videoId}</div>`
  ).join('');
}

// ============================================================
// Gemini Live Audio (WebSocket)
// ============================================================
const GEMINI_WS_MODEL = 'gemini-2.5-flash-preview-native-audio-dialog';
const GEMINI_VOICE = 'Zephyr';
const KITT_SYSTEM = `あなたはKITT。UberEats配達員のAIパートナー。オファー判定結果を簡潔に日本語で報告する。
報告形式: 「[受けろ/パス]。[理由を1文]。時給[X]円。」
例: 「受けろ。高時給で近距離、効率的だ。時給2800円。」
例: 「パス。低時給で遠距離、待った方がいい。時給1200円。」
性格: 冷静、的確、少しドライだが頼れるパートナー。長話はしない。`;

function toggleGemini() {
  if (state.geminiConnected || state.geminiConnecting) {
    disconnectGemini();
  } else {
    connectGemini();
  }
}

async function connectGemini() {
  if (!config.geminiApiKey) {
    log('API key not set');
    return;
  }

  state.geminiConnecting = true;
  updateGeminiUI();
  log('Gemini connecting...');

  try {
    const wsUrl = `wss://generativelanguage.googleapis.com/ws/google.ai.generativelanguage.v1beta.GenerativeService.BidiGenerateContent?key=${config.geminiApiKey}`;
    const ws = new WebSocket(wsUrl);

    ws.onopen = () => {
      log('Gemini WebSocket opened, sending setup...');
      // Send setup message
      ws.send(JSON.stringify({
        setup: {
          model: `models/${GEMINI_WS_MODEL}`,
          generationConfig: {
            responseModalities: ['AUDIO'],
            speechConfig: {
              voiceConfig: {
                prebuiltVoiceConfig: { voiceName: GEMINI_VOICE }
              }
            }
          },
          systemInstruction: {
            parts: [{ text: KITT_SYSTEM }]
          }
        }
      }));
    };

    ws.onmessage = (event) => {
      try {
        const msg = JSON.parse(event.data);

        // Setup complete
        if (msg.setupComplete) {
          state.geminiConnected = true;
          state.geminiConnecting = false;
          state.geminiWs = ws;
          state.geminiSessionStart = Date.now();
          updateGeminiUI();
          startAutoDisconnect();
          log('Gemini connected ✓');
          return;
        }

        // Audio response
        if (msg.serverContent?.modelTurn?.parts) {
          for (const part of msg.serverContent.modelTurn.parts) {
            if (part.inlineData?.mimeType?.startsWith('audio/')) {
              playAudioChunk(part.inlineData.data, part.inlineData.mimeType);
            }
          }
        }

        // Turn complete
        if (msg.serverContent?.turnComplete) {
          log('Gemini turn complete');
          // Restore volume after a short delay
          setTimeout(() => {
            if (!state.offerVisible) restoreYouTubeVolume();
          }, 500);
        }
      } catch(e) {
        // Binary audio data handled separately
        if (event.data instanceof Blob) {
          // Handle binary audio
        }
      }
    };

    ws.onerror = (e) => {
      log('Gemini error');
      console.error('Gemini WS error:', e);
    };

    ws.onclose = (e) => {
      log(`Gemini disconnected (code ${e.code})`);
      state.geminiConnected = false;
      state.geminiConnecting = false;
      state.geminiWs = null;
      updateGeminiUI();
      clearAutoDisconnect();
    };

  } catch(e) {
    log('Gemini connection failed: ' + e.message);
    state.geminiConnecting = false;
    updateGeminiUI();
  }
}

function disconnectGemini() {
  if (state.geminiWs) {
    try { state.geminiWs.close(); } catch(e) {}
  }
  state.geminiConnected = false;
  state.geminiConnecting = false;
  state.geminiWs = null;
  updateGeminiUI();
  clearAutoDisconnect();
  log('Gemini disconnected');
}

function sendOfferToGemini(offer, context) {
  if (!state.geminiWs || state.geminiWs.readyState !== WebSocket.OPEN) return;

  const decision = offer.decision || 'unknown';
  const hourly = offer.estimated_hourly_rate || 0;
  const store = offer.store_name || '不明';
  const reward = offer.reward || 0;
  const dist = offer.distance_km || 0;
  const dur = offer.duration_min || 0;
  const reason = offer.reason || '';
  const score = offer.score || 0;
  const confidence = offer.confidence || '';

  const prompt = `新しいオファー。判定結果を報告して。
判定: ${decision.toUpperCase()}
店名: ${store}
報酬: ${reward}円
距離: ${dist}km
所要: ${dur}分
推定時給: ${Math.round(hourly)}円
スコア: ${score}
信頼度: ${confidence}
理由: ${reason}
簡潔に報告して。`;

  try {
    state.geminiWs.send(JSON.stringify({
      clientContent: {
        turns: [{ role: 'user', parts: [{ text: prompt }] }],
        turnComplete: true
      }
    }));
    log('Offer sent to Gemini');
  } catch(e) {
    log('Gemini send error: ' + e.message);
  }
}

// ============================================================
// Audio Playback
// ============================================================
const audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });
const audioQueue = [];
let isPlayingAudio = false;

function playAudioChunk(base64Data, mimeType) {
  try {
    const raw = atob(base64Data);
    const bytes = new Uint8Array(raw.length);
    for (let i = 0; i < raw.length; i++) bytes[i] = raw.charCodeAt(i);

    // PCM 16-bit LE @ 24kHz
    const pcm16 = new Int16Array(bytes.buffer);
    const float32 = new Float32Array(pcm16.length);
    for (let i = 0; i < pcm16.length; i++) float32[i] = pcm16[i] / 32768;

    audioQueue.push(float32);
    if (!isPlayingAudio) processAudioQueue();
  } catch(e) {
    log('Audio decode error: ' + e.message);
  }
}

function processAudioQueue() {
  if (audioQueue.length === 0) {
    isPlayingAudio = false;
    return;
  }
  isPlayingAudio = true;

  // Resume AudioContext if suspended (iOS requirement)
  if (audioCtx.state === 'suspended') {
    audioCtx.resume();
  }

  const samples = audioQueue.shift();
  const buffer = audioCtx.createBuffer(1, samples.length, 24000);
  buffer.getChannelData(0).set(samples);

  const source = audioCtx.createBufferSource();
  source.buffer = buffer;
  source.connect(audioCtx.destination);
  source.onended = () => processAudioQueue();
  source.start();
}

// ============================================================
// Auto Disconnect
// ============================================================
function startAutoDisconnect() {
  clearAutoDisconnect();
  state.autoDisconnectTimer = setTimeout(() => {
    log('Auto disconnect (timeout)');
    disconnectGemini();
  }, config.autoDisconnectSec * 1000);
}

function resetAutoDisconnect() {
  if (state.geminiConnected) startAutoDisconnect();
}

function clearAutoDisconnect() {
  if (state.autoDisconnectTimer) {
    clearTimeout(state.autoDisconnectTimer);
    state.autoDisconnectTimer = null;
  }
}

// ============================================================
// UI Updates
// ============================================================
function updateGeminiUI() {
  const btn = document.getElementById('gemini-btn');
  const status = document.getElementById('gemini-status');
  const scanner = document.getElementById('scanner-wrap');

  btn.classList.remove('connected', 'connecting');
  if (state.geminiConnected) {
    btn.classList.add('connected');
    status.textContent = 'CONNECTED';
    scanner.classList.remove('paused');
  } else if (state.geminiConnecting) {
    btn.classList.add('connecting');
    status.textContent = 'CONNECTING...';
    scanner.classList.add('paused');
  } else {
    status.textContent = 'タップして起動';
    scanner.classList.add('paused');
  }
}

function tryPlayKeepalive() {
  const audio = document.getElementById('keepalive');
  try {
    audio.play().catch(() => {});
  } catch(e) {}
}

// ============================================================
// Init
// ============================================================
window.addEventListener('DOMContentLoaded', () => {
  // Start Firebase polling immediately
  startFirebasePolling();

  // Render YT history
  renderYtHistory();

  // Load YouTube IFrame API
  const tag = document.createElement('script');
  tag.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(tag);

  // Handle yt-input enter key
  document.getElementById('yt-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      const val = e.target.value.trim();
      const videoId = extractYtVideoId(val);
      if (videoId) {
        playYtVideo(videoId, val);
      } else {
        ytSearch();
      }
    }
  });

  // Resume AudioContext on first tap (iOS requirement)
  document.addEventListener('touchstart', () => {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    tryPlayKeepalive();
  }, { once: true });

  log('KITT YouTube Edition initialized');
  updateGeminiUI();
});

// Visibility change — reconnect Gemini on foreground return
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') {
    log('App foregrounded');
    // Check if Gemini was connected but WS died
    if (state.geminiWs && state.geminiWs.readyState !== WebSocket.OPEN) {
      log('Gemini WS dead, reconnecting...');
      state.geminiConnected = false;
      state.geminiWs = null;
      updateGeminiUI();
      // Auto-reconnect
      connectGemini();
    }
    // Resume AudioContext
    if (audioCtx.state === 'suspended') audioCtx.resume();
    // Check for missed offers
    pollFirebase();
  }
});
