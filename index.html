<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="theme-color" content="#000000">
  <title>KITT</title>
  <link rel="manifest" href="manifest.json">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --kitt-red: #ff1a1a;
      --kitt-red-glow: rgba(255, 26, 26, 0.6);
      --kitt-red-dim: rgba(255, 26, 26, 0.15);
      --kitt-amber: #ffaa00;
      --kitt-green: #00ff66;
      --kitt-bg: #0a0a0a;
      --kitt-surface: #111111;
      --kitt-text: #cccccc;
      --kitt-text-dim: #666666;
    }

    html, body {
      height: 100%;
      background: var(--kitt-bg);
      color: var(--kitt-text);
      font-family: 'Share Tech Mono', monospace;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100%;
      height: 100dvh;
    }

    /* ===== Header ===== */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      min-height: 44px;
    }

    .status-badge {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 3px;
      letter-spacing: 0.5px;
      font-family: 'Share Tech Mono', monospace;
    }

    .status-badge.connected { background: rgba(0,255,102,0.15); color: var(--kitt-green); }
    .status-badge.disconnected { background: rgba(255,26,26,0.15); color: var(--kitt-red); }
    .status-badge.connecting { background: rgba(255,170,0,0.15); color: var(--kitt-amber); }
    .status-badge.firebase { background: rgba(0,255,102,0.1); color: var(--kitt-green); font-size: 10px; }

    /* ===== KITT Eye ===== */
    .kitt-eye-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 20px;
    }

    .kitt-eye {
      position: relative;
      width: 200px;
      height: 200px;
    }

    .kitt-eye-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 3px solid var(--kitt-red-dim);
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .kitt-eye-ring.active {
      border-color: var(--kitt-red);
      box-shadow: 0 0 40px var(--kitt-red-glow), 0 0 80px rgba(255,26,26,0.3), inset 0 0 30px rgba(255,26,26,0.1);
      animation: pulse-ring 2s ease-in-out infinite;
    }

    .kitt-eye-ring.speaking {
      animation: speak-pulse 0.4s ease-in-out infinite alternate;
    }

    @keyframes pulse-ring {
      0%, 100% { box-shadow: 0 0 40px var(--kitt-red-glow), 0 0 80px rgba(255,26,26,0.2); }
      50% { box-shadow: 0 0 60px var(--kitt-red-glow), 0 0 100px rgba(255,26,26,0.35); }
    }

    @keyframes speak-pulse {
      0% { transform: scale(1); box-shadow: 0 0 40px var(--kitt-red-glow), 0 0 80px rgba(255,26,26,0.3); }
      100% { transform: scale(1.03); box-shadow: 0 0 70px var(--kitt-red-glow), 0 0 120px rgba(255,26,26,0.45); }
    }

    .kitt-eye-label {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 42px;
      color: var(--kitt-red);
      letter-spacing: 6px;
      text-shadow: 0 0 20px var(--kitt-red-glow);
      opacity: 0.9;
    }

    .kitt-status-text {
      font-size: 13px;
      color: var(--kitt-text-dim);
      text-align: center;
      letter-spacing: 1px;
      min-height: 20px;
    }

    /* ===== Offer Panel ===== */
    .offer-panel {
      margin: 0 16px;
      padding: 12px 16px;
      background: var(--kitt-surface);
      border-radius: 8px;
      border-left: 3px solid var(--kitt-text-dim);
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.4s, transform 0.4s, border-color 0.3s;
      max-height: 0;
      overflow: hidden;
    }

    .offer-panel.visible {
      opacity: 1;
      transform: translateY(0);
      max-height: 250px;
      margin-bottom: 12px;
    }

    .offer-panel.accept { border-left-color: var(--kitt-green); }
    .offer-panel.reject { border-left-color: var(--kitt-red); }

    .offer-decision {
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 2px;
      margin-bottom: 6px;
    }

    .offer-decision.accept { color: var(--kitt-green); }
    .offer-decision.reject { color: var(--kitt-red); }

    .offer-detail {
      font-size: 13px;
      color: var(--kitt-text);
      line-height: 1.5;
    }

    .offer-metrics {
      display: flex;
      gap: 12px;
      margin-top: 6px;
      font-size: 11px;
      color: var(--kitt-text-dim);
    }

    .offer-metrics span {
      white-space: nowrap;
    }

    /* ===== Transcript ===== */
    .transcript-area {
      padding: 0 16px 8px;
      max-height: 120px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .transcript-line {
      font-size: 13px;
      line-height: 1.5;
      padding: 4px 0;
      color: var(--kitt-text-dim);
      animation: fade-in 0.3s ease;
    }

    .transcript-line.kitt { color: var(--kitt-red); }
    .transcript-line.user { color: var(--kitt-text); }
    .transcript-line.system { color: var(--kitt-amber); font-size: 11px; }

    @keyframes fade-in {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ===== Bottom Controls ===== */
    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 16px;
      padding-bottom: max(16px, env(safe-area-inset-bottom));
    }

    .mic-btn {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 2px solid var(--kitt-red-dim);
      background: transparent;
      color: var(--kitt-text-dim);
      font-size: 24px;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .mic-btn.active {
      border-color: var(--kitt-red);
      color: var(--kitt-red);
      box-shadow: 0 0 20px rgba(255,26,26,0.3);
      animation: mic-glow 1.5s ease-in-out infinite;
    }

    @keyframes mic-glow {
      0%, 100% { box-shadow: 0 0 20px rgba(255,26,26,0.3); }
      50% { box-shadow: 0 0 35px rgba(255,26,26,0.5); }
    }

    .mic-btn:active { transform: scale(0.95); }

    .settings-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1px solid #333;
      background: transparent;
      color: var(--kitt-text-dim);
      font-size: 18px;
      cursor: pointer;
    }

    /* ===== API Key Modal ===== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 20px;
    }

    .modal-overlay.hidden { display: none; }

    .modal {
      background: var(--kitt-surface);
      border: 1px solid #333;
      border-radius: 12px;
      padding: 24px;
      width: 100%;
      max-width: 360px;
    }

    .modal h2 {
      font-family: 'Orbitron', sans-serif;
      font-size: 16px;
      color: var(--kitt-red);
      margin-bottom: 16px;
      letter-spacing: 2px;
    }

    .modal input {
      width: 100%;
      padding: 10px 12px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 6px;
      color: var(--kitt-text);
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px;
      margin-bottom: 16px;
    }

    .modal input:focus { outline: none; border-color: var(--kitt-red); }

    .modal-btn {
      width: 100%;
      padding: 10px;
      background: var(--kitt-red);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-family: 'Orbitron', sans-serif;
      font-size: 13px;
      letter-spacing: 1px;
      cursor: pointer;
    }

    .modal-btn:active { opacity: 0.8; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 2px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 1px; }
  </style>
</head>
<body>

<div class="app">
  <!-- Header -->
  <div class="header">
    <span class="status-badge disconnected" id="connStatus">OFFLINE</span>
    <span class="status-badge firebase" id="fbStatus">Firebase --</span>
  </div>

  <!-- KITT Eye -->
  <div class="kitt-eye-container">
    <div class="kitt-eye" id="kittEye">
      <div class="kitt-eye-ring" id="eyeRing"></div>
      <div class="kitt-eye-label">KITT</div>
    </div>
    <div class="kitt-status-text" id="statusText">タップして起動</div>
  </div>

  <!-- Offer Panel -->
  <div class="offer-panel" id="offerPanel">
    <div class="offer-decision" id="offerDecision"></div>
    <div class="offer-detail" id="offerDetail"></div>
    <div class="offer-metrics" id="offerMetrics"></div>
  </div>

  <!-- Transcript -->
  <div class="transcript-area" id="transcript"></div>

  <!-- Controls -->
  <div class="controls">
    <button class="settings-btn" id="settingsBtn">⚙</button>
    <button class="mic-btn" id="micBtn">🎙</button>
    <button class="settings-btn" id="clearBtn">✕</button>
  </div>
</div>

<!-- API Key Modal -->
<div class="modal-overlay" id="apiModal">
  <div class="modal">
    <h2>GEMINI API KEY</h2>
    <input type="password" id="apiKeyInput" placeholder="AIzaSy..." autocomplete="off">
    <button class="modal-btn" id="apiKeySave">INITIALIZE</button>
  </div>
</div>

<script>
// ============================================================
// KITT Voice PWA - Gemini Live Audio + Firebase RTDB
// Updated: 2026-03-21 - New RTDB structure support
// ============================================================

const FIREBASE_DB_URL = 'https://ubereats-kitt-default-rtdb.asia-southeast1.firebasedatabase.app';
const GEMINI_WS_URL = 'wss://generativelanguage.googleapis.com/ws/google.ai.generativelanguage.v1beta.GenerativeService.BidiGenerateContent';
const GEMINI_MODEL = 'models/gemini-2.5-flash-native-audio-preview-12-2025';

// --- State ---
let apiKey = localStorage.getItem('kitt_api_key') || '';
let ws = null;
let audioCtx = null;
let micStream = null;
let micProcessor = null;
let isConnected = false;
let isSpeaking = false;
let silenceTimer = null;
let firebaseEventSource = null;
let lastOfferTimestamp = null;
let firebasePollTimer = null;

// --- DOM Elements ---
const $ = id => document.getElementById(id);
const connStatus = $('connStatus');
const fbStatus = $('fbStatus');
const eyeRing = $('eyeRing');
const statusText = $('statusText');
const offerPanel = $('offerPanel');
const offerDecision = $('offerDecision');
const offerDetail = $('offerDetail');
const offerMetrics = $('offerMetrics');
const transcript = $('transcript');
const micBtn = $('micBtn');
const settingsBtn = $('settingsBtn');
const clearBtn = $('clearBtn');
const apiModal = $('apiModal');
const apiKeyInput = $('apiKeyInput');
const apiKeySave = $('apiKeySave');

// ============================================================
// Init
// ============================================================
function init() {
  if (apiKey) {
    apiModal.classList.add('hidden');
    startFirebaseListener();
  }

  micBtn.addEventListener('click', toggleConnection);
  settingsBtn.addEventListener('click', () => {
    apiModal.classList.remove('hidden');
    apiKeyInput.value = apiKey;
  });
  clearBtn.addEventListener('click', clearTranscript);
  apiKeySave.addEventListener('click', saveApiKey);

  // Prevent iOS zoom on double-tap
  document.addEventListener('dblclick', e => e.preventDefault());
}

function saveApiKey() {
  const key = apiKeyInput.value.trim();
  if (!key) return;
  apiKey = key;
  localStorage.setItem('kitt_api_key', key);
  apiModal.classList.add('hidden');
  startFirebaseListener();
  setStatus('connecting', 'READY');
  statusText.textContent = 'タップして起動';
}

// ============================================================
// UI Helpers
// ============================================================
function setStatus(state, text) {
  connStatus.className = `status-badge ${state}`;
  connStatus.textContent = text;
}

function setEyeState(state) {
  eyeRing.className = 'kitt-eye-ring';
  if (state === 'active') eyeRing.classList.add('active');
  if (state === 'speaking') {
    eyeRing.classList.add('active');
    eyeRing.classList.add('speaking');
  }
}

function addTranscript(text, type) {
  // Filter out Gemini thinking/reasoning artifacts
  const cleaned = filterThinking(text);
  if (!cleaned) return;
  const div = document.createElement('div');
  div.className = `transcript-line ${type}`;
  div.textContent = cleaned;
  transcript.appendChild(div);
  transcript.scrollTop = transcript.scrollHeight;
  // Keep only last 20 lines
  while (transcript.children.length > 20) {
    transcript.removeChild(transcript.firstChild);
  }
}

function clearTranscript() {
  transcript.innerHTML = '';
  offerPanel.classList.remove('visible', 'accept', 'reject');
}

// ============================================================
// [UPDATED] Show Offer - New RTDB structure
// Old: { text, timestamp, decision }
// New: { offer: {...}, context: {...}, timestamp }
// ============================================================
function showOffer(data) {
  // Support both old and new structure
  const offer = data.offer || data;
  const decision = offer.decision || '';
  const storeName = offer.store_name || '';
  const reward = offer.reward || 0;
  const distanceKm = offer.distance_km || 0;
  const durationMin = offer.duration_min || 0;
  const hourlyRate = offer.estimated_hourly_rate || 0;
  const reason = offer.reason || '';
  const score = offer.score;
  const confidence = offer.confidence || '';

  // Decision header
  offerDecision.textContent = decision === 'accept' ? '▲ ACCEPT' : '▼ REJECT';
  offerDecision.className = `offer-decision ${decision}`;

  // Detail line: store name + reason
  const detailParts = [];
  if (storeName) detailParts.push(storeName);
  if (reason) detailParts.push(reason);
  offerDetail.textContent = detailParts.join(' — ') || `${reward}円 / ${distanceKm}km`;

  // Metrics line: reward, distance, hourly rate, score
  const metricParts = [];
  if (reward) metricParts.push(`¥${reward}`);
  if (distanceKm) metricParts.push(`${distanceKm}km`);
  if (durationMin) metricParts.push(`${durationMin}分`);
  if (hourlyRate) metricParts.push(`¥${Math.round(hourlyRate)}/h`);
  if (score != null) metricParts.push(`S:${typeof score === 'number' ? score.toFixed(2) : score}`);
  offerMetrics.innerHTML = metricParts.map(m => `<span>${m}</span>`).join('');

  // Panel styling
  offerPanel.className = `offer-panel visible ${decision}`;

  // Auto-hide after 30 seconds
  setTimeout(() => {
    offerPanel.classList.remove('visible');
  }, 30000);
}

// ============================================================
// [UPDATED] Build Gemini injection text from structured data
// ============================================================
function buildOfferInjectionText(data) {
  const offer = data.offer || {};
  const context = data.context || {};
  const sd = offer.score_detail || {};
  const scores = sd.scores || {};

  const parts = [];
  parts.push(`判定: ${offer.decision === 'accept' ? 'アクセプト' : 'リジェクト'}`);
  if (offer.store_name) parts.push(`店: ${offer.store_name}`);
  if (offer.reward) parts.push(`報酬: ${offer.reward}円`);
  if (offer.distance_km) parts.push(`距離: ${offer.distance_km}km`);
  if (offer.duration_min) parts.push(`${offer.duration_min}分`);
  if (offer.estimated_hourly_rate) parts.push(`時給換算: ${Math.round(offer.estimated_hourly_rate)}円`);
  if (offer.reason) parts.push(`理由: ${offer.reason}`);
  if (offer.confidence) parts.push(`確信度: ${offer.confidence}`);

  // Add score breakdown for richer KITT commentary
  if (scores.hourly_rate != null) {
    const hr = scores.hourly_rate;
    if (hr > 1.3) parts.push('時給スコア非常に高い');
    else if (hr < 0.7) parts.push('時給スコア低い');
  }
  if (scores.reward_per_km != null) {
    const rpk = scores.reward_per_km;
    if (rpk > 1.3) parts.push('km単価効率良い');
    else if (rpk < 0.7) parts.push('km単価悪い');
  }

  // Time slot average for context
  if (sd.timeSlotAvg) parts.push(`この時間帯の平均時給: ${Math.round(sd.timeSlotAvg)}円`);

  return parts.join('、');
}

// ============================================================
// Text Filtering - Remove Gemini thinking artifacts
// ============================================================
function filterThinking(text) {
  if (!text || typeof text !== 'string') return '';
  let t = text;

  // Remove **Header** thinking blocks
  t = t.replace(/\*\*[^*]+\*\*\s*/g, '');

  // Remove common thinking patterns
  const patterns = [
    /^I'm encountering .+/gm,
    /^Given the situation.+/gm,
    /^This will .+ensuring.+/gm,
    /^Let me .+before responding.*/gm,
    /^I need to .+carefully.*/gm,
    /^I suspect .+/gm,
    /^My response .+/gm,
    /^I will .+polite.+/gm,
    /^I should .+/gm,
    /^Okay, .+let me.+/gm,
  ];
  for (const p of patterns) {
    t = t.replace(p, '');
  }

  // Remove HTML-like fragments that leaked
  t = t.replace(/<\/?[a-z][a-z0-9]*\s*\/?>/gi, '');
  t = t.replace(/[a-z]+>/gi, '');

  // Clean up whitespace
  t = t.replace(/\n{2,}/g, '\n').trim();
  return t;
}

// ============================================================
// [UPDATED] Firebase RTDB Listener (Polling)
// Now handles: { offer: {...}, context: {...}, timestamp }
// ============================================================
function startFirebaseListener() {
  // Clear previous timer if any
  if (firebasePollTimer) {
    clearInterval(firebasePollTimer);
  }

  const url = `${FIREBASE_DB_URL}/offer_tts.json`;

  fbStatus.textContent = 'Firebase Active';
  fbStatus.className = 'status-badge firebase';

  // Poll every 3 seconds
  firebasePollTimer = setInterval(async () => {
    try {
      const res = await fetch(url);
      if (!res.ok) return;
      const data = await res.json();
      if (!data || !data.timestamp) return;

      // Only process new offers
      if (data.timestamp !== lastOfferTimestamp) {
        lastOfferTimestamp = data.timestamp;

        // Show offer in UI (works with new structure)
        showOffer(data);

        // Build transcript summary
        const offer = data.offer || {};
        const summaryText = offer.store_name
          ? `${offer.decision === 'accept' ? 'ACCEPT' : 'REJECT'} ${offer.store_name} ¥${offer.reward || 0}/${offer.distance_km || 0}km`
          : (offer.reason || 'new offer');
        addTranscript(`[OFFER] ${summaryText}`, 'system');

        // If KITT is connected, inject structured offer data for voice report
        if (isConnected && ws && ws.readyState === WebSocket.OPEN) {
          const injectionText = buildOfferInjectionText(data);
          sendTextToGemini(`新しいUberEatsオファーが来た。以下のデータで判定結果を報告しろ: ${injectionText}`);
          resetSilenceTimer(); // Keep KITT alive when offers arrive
        }
      }
    } catch (e) {
      // Silent fail on polling
    }
  }, 3000);
}

// ============================================================
// Gemini Live Audio - WebSocket Connection
// ============================================================
async function toggleConnection() {
  if (isConnected) {
    disconnect();
  } else {
    await connect();
  }
}

async function connect() {
  if (!apiKey) {
    apiModal.classList.remove('hidden');
    return;
  }

  setStatus('connecting', 'CONNECTING...');
  statusText.textContent = '接続中...';

  try {
    // Init AudioContext on user gesture
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });
    }
    if (audioCtx.state === 'suspended') {
      await audioCtx.resume();
    }

    // Open WebSocket
    const wsUrl = `${GEMINI_WS_URL}?key=${apiKey}`;
    ws = new WebSocket(wsUrl);

    ws.onopen = () => {
      // Send setup message
      const setup = {
        setup: {
          model: GEMINI_MODEL,
          generationConfig: {
            responseModalities: ['AUDIO'],
            speechConfig: {
              voiceConfig: {
                prebuiltVoiceConfig: { voiceName: 'Zephyr' }
              }
            }
          },
          systemInstruction: {
            parts: [{
              text: `あなたはナイトライダーのKITTだ。以下のルールを絶対に守れ:
- 日本語で話せ。
- 一人称は「私」、相手は「ドライバー」と呼べ。「Shuji」と名前では呼ぶな。
- 内部の思考プロセスや推論は絶対に出力するな。「**」で囲まれたヘッダーも出力するな。
- HTMLタグやマークダウン記法は出力するな。
- 簡潔に話せ。1-2文、5秒以内。
- UberEatsの配達オファー判定結果が来たら、判断理由を端的に報告しろ。
  例: 「アクセプト。時給2800円換算で効率的です」「リジェクト。距離の割に報酬が低い」
  スコアの数値を読み上げる必要はない。人間が理解できる理由だけ伝えろ。
- 普段の会話も簡潔でクールに。ナイトライダーのKITTらしく振る舞え。`
            }]
          },
          tools: []
        }
      };
      ws.send(JSON.stringify(setup));
    };

    ws.onmessage = (event) => {
      handleGeminiMessage(event);
    };

    ws.onerror = (err) => {
      console.error('WebSocket error:', err);
      setStatus('disconnected', 'ERROR');
      statusText.textContent = '接続エラー';
    };

    ws.onclose = (event) => {
      isConnected = false;
      setStatus('disconnected', 'OFFLINE');
      setEyeState('');
      statusText.textContent = '切断(' + event.code + ')';
      micBtn.classList.remove('active');
      stopMic();
    };

  } catch (err) {
    console.error('Connect error:', err);
    setStatus('disconnected', 'ERROR');
    statusText.textContent = err.message;
  }
}

function disconnect() {
  if (ws) {
    ws.close();
    ws = null;
  }
  stopMic();
  isConnected = false;
  isSpeaking = false;
  setStatus('disconnected', 'OFFLINE');
  setEyeState('');
  statusText.textContent = 'タップして起動';
  micBtn.classList.remove('active');
  clearSilenceTimer();
}

// ============================================================
// Gemini Message Handler
// ============================================================
let audioQueue = [];
let isPlayingAudio = false;
let currentTranscriptText = '';

async function handleGeminiMessage(event) {
  try {
    let msg;
    if (event.data instanceof Blob) {
      const text = await event.data.text();
      msg = JSON.parse(text);
    } else {
      msg = JSON.parse(event.data);
    }

    // Setup complete
    if (msg.setupComplete) {
      isConnected = true;
      setStatus('connected', 'ONLINE');
      setEyeState('active');
      statusText.textContent = 'Listening...';
      micBtn.classList.add('active');
      await startMic();
      resetSilenceTimer();
      return;
    }

    // Server content (audio + text responses)
    if (msg.serverContent) {
      const sc = msg.serverContent;

      // Model turn
      if (sc.modelTurn && sc.modelTurn.parts) {
        for (const part of sc.modelTurn.parts) {
          // Audio data
          if (part.inlineData && part.inlineData.mimeType && part.inlineData.mimeType.startsWith('audio/')) {
            const audioBytes = base64ToArrayBuffer(part.inlineData.data);
            audioQueue.push(audioBytes);
            if (!isPlayingAudio) {
              playAudioQueue();
            }
          }

          // Text data (disabled - audio only mode)
          if (false && part.text) {
            const cleaned = filterThinking(part.text);
            if (cleaned) {
              currentTranscriptText += cleaned;
            }
          }
        }
      }

      // Turn complete
      if (sc.turnComplete) {
        if (currentTranscriptText) {
          addTranscript(currentTranscriptText, 'kitt');
          currentTranscriptText = '';
        }
        isSpeaking = false;
        setEyeState('active');
        statusText.textContent = 'Listening...';
        resetSilenceTimer();
      }

      // Interrupted
      if (sc.interrupted) {
        audioQueue = [];
        isPlayingAudio = false;
        isSpeaking = false;
        currentTranscriptText = '';
        setEyeState('active');
      }
    }
  } catch (e) {
    console.error('Message parse error:', e);
  }
}

// ============================================================
// Audio Playback
// ============================================================
function base64ToArrayBuffer(base64) {
  const binary = atob(base64);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) {
    bytes[i] = binary.charCodeAt(i);
  }
  return bytes.buffer;
}

async function playAudioQueue() {
  isPlayingAudio = true;
  isSpeaking = true;
  setEyeState('speaking');
  statusText.textContent = 'Speaking...';

  while (audioQueue.length > 0) {
    const audioData = audioQueue.shift();
    await playPcmAudio(audioData);
  }

  isPlayingAudio = false;
  if (!audioQueue.length) {
    isSpeaking = false;
  }
}

function playPcmAudio(arrayBuffer) {
  return new Promise((resolve) => {
    try {
      if (!audioCtx) { resolve(); return; }
      const int16 = new Int16Array(arrayBuffer);
      const float32 = new Float32Array(int16.length);
      for (let i = 0; i < int16.length; i++) {
        float32[i] = int16[i] / 32768;
      }
      const audioBuffer = audioCtx.createBuffer(1, float32.length, 24000);
      audioBuffer.getChannelData(0).set(float32);
      const source = audioCtx.createBufferSource();
      source.buffer = audioBuffer;
      source.connect(audioCtx.destination);
      source.onended = resolve;
      source.start();
    } catch (e) {
      console.error('Audio playback error:', e);
      resolve();
    }
  });
}

// ============================================================
// Microphone Capture
// ============================================================
async function startMic() {
  try {
    micStream = await navigator.mediaDevices.getUserMedia({
      audio: {
        sampleRate: 16000,
        channelCount: 1,
        echoCancellation: true,
        noiseSuppression: true,
        autoGainControl: true
      }
    });

    const micCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
    const source = micCtx.createMediaStreamSource(micStream);

    // ScriptProcessor (deprecated but widely supported)
    micProcessor = micCtx.createScriptProcessor(4096, 1, 1);
    micProcessor.onaudioprocess = (e) => {
      if (!isConnected || !ws || ws.readyState !== WebSocket.OPEN) return;

      const float32 = e.inputBuffer.getChannelData(0);

      // Voice activity detection (simple energy-based)
      let energy = 0;
      for (let i = 0; i < float32.length; i++) {
        energy += float32[i] * float32[i];
      }
      energy = energy / float32.length;
      if (energy > 0.0005) {
        resetSilenceTimer();
      }

      // Convert to 16-bit PCM
      const int16 = new Int16Array(float32.length);
      for (let i = 0; i < float32.length; i++) {
        const s = Math.max(-1, Math.min(1, float32[i]));
        int16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
      }

      // Send to Gemini
      const base64 = arrayBufferToBase64(int16.buffer);
      try {
        ws.send(JSON.stringify({
          realtimeInput: {
            mediaChunks: [{
              mimeType: 'audio/pcm;rate=16000',
              data: base64
            }]
          }
        }));
      } catch (e) {
        // Connection might be closing
      }
    };

    source.connect(micProcessor);
    micProcessor.connect(micCtx.destination);

  } catch (err) {
    console.error('Mic error:', err);
    addTranscript('マイクへのアクセスが拒否されました', 'system');
  }
}

function stopMic() {
  if (micProcessor) {
    micProcessor.disconnect();
    micProcessor = null;
  }
  if (micStream) {
    micStream.getTracks().forEach(t => t.stop());
    micStream = null;
  }
}

function arrayBufferToBase64(buffer) {
  const bytes = new Uint8Array(buffer);
  let binary = '';
  for (let i = 0; i < bytes.length; i++) {
    binary += String.fromCharCode(bytes[i]);
  }
  return btoa(binary);
}

// ============================================================
// Send Text to Gemini (for offer injection)
// ============================================================
function sendTextToGemini(text) {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  try {
    ws.send(JSON.stringify({
      clientContent: {
        turns: [{
          role: 'user',
          parts: [{ text: text }]
        }],
        turnComplete: true
      }
    }));
  } catch (e) {
    console.error('Send text error:', e);
  }
}

// ============================================================
// Silence Timer (10-second auto-disconnect)
// ============================================================
function resetSilenceTimer() {
  clearSilenceTimer();
  silenceTimer = setTimeout(() => {
    if (isConnected && !isSpeaking) {
      addTranscript('2分無音 - 自動切断', 'system');
      disconnect();
    }
  }, 120000);
}

function clearSilenceTimer() {
  if (silenceTimer) {
    clearTimeout(silenceTimer);
    silenceTimer = null;
  }
}

// ============================================================
// Boot
// ============================================================
document.addEventListener('DOMContentLoaded', init);
</script>
