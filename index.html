<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>KITT</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0a;--red:#e03030;--red-dim:#801818;--amber:#ff9500;
  --green:#30d060;--cyan:#00e5ff;--text:#e8e8e8;--text-dim:#666;
  --card:#141414;--border:#222;--overlay-bg:rgba(10,10,10,0.92);
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Orbitron',monospace;-webkit-tap-highlight-color:transparent;touch-action:manipulation}

/* === Tab Bar === */
#tab-bar{display:flex;height:44px;background:#111;border-bottom:1px solid var(--border);position:relative;z-index:100}
.tab{flex:1;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);cursor:pointer;transition:color .2s,border-color .2s;border-bottom:2px solid transparent;user-select:none}
.tab.active{color:var(--red);border-bottom-color:var(--red)}
.tab:active{opacity:.7}

/* === Panels === */
#panels{position:relative;height:calc(100% - 44px);overflow:hidden}
.panel{position:absolute;inset:0;display:none;flex-direction:column}
.panel.active{display:flex}

/* === KITT Panel === */
#kitt-panel{background:var(--bg);align-items:center;justify-content:center}
#kitt-status{position:absolute;top:8px;left:12px;font-size:9px;letter-spacing:1px;color:var(--text-dim)}
#kitt-status .online{color:var(--green)}
#kitt-status .error{color:var(--red)}

#scanner-wrap{width:200px;height:12px;background:#1a0000;border-radius:6px;overflow:hidden;position:relative;margin-bottom:20px}
#scanner-bar{width:40%;height:100%;background:linear-gradient(90deg,transparent,var(--red),transparent);position:absolute;left:0;animation:scan 2s ease-in-out infinite alternate;border-radius:6px}
@keyframes scan{0%{left:-10%}100%{left:70%}}
#scanner-wrap.paused #scanner-bar{animation-play-state:paused;opacity:.3}

#kitt-label{font-size:28px;font-weight:900;letter-spacing:8px;margin-bottom:8px}
#kitt-sub{font-size:10px;color:var(--text-dim);letter-spacing:2px;margin-bottom:24px}

#gemini-btn{width:64px;height:64px;border-radius:50%;border:2px solid var(--red-dim);background:rgba(224,48,48,.08);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .3s}
#gemini-btn:active{transform:scale(.9)}
#gemini-btn.connected{border-color:var(--green);background:rgba(48,208,96,.1);box-shadow:0 0 20px rgba(48,208,96,.2)}
#gemini-btn.connecting{border-color:var(--amber);animation:pulse-border 1s infinite}
@keyframes pulse-border{0%,100%{border-color:var(--amber)}50%{border-color:transparent}}
#gemini-btn svg{width:28px;height:28px;fill:var(--red)}
#gemini-btn.connected svg{fill:var(--green)}

#gemini-status{font-size:9px;color:var(--text-dim);margin-top:12px;letter-spacing:1px;height:14px}

#kitt-buttons{display:flex;gap:20px;align-items:center}
#mic-btn{width:48px;height:48px;border-radius:50%;border:2px solid var(--border);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .3s}
#mic-btn:active{transform:scale(.9)}
#mic-btn.active{border-color:var(--red);background:rgba(224,48,48,.15);animation:mic-pulse 1.5s infinite}
#mic-btn svg{width:22px;height:22px;fill:var(--text-dim)}
#mic-btn.active svg{fill:var(--red)}
@keyframes mic-pulse{0%,100%{box-shadow:0 0 0 0 rgba(224,48,48,.3)}50%{box-shadow:0 0 12px 4px rgba(224,48,48,.15)}}

/* === YouTube Panel === */
#yt-panel{background:#000}
#yt-search-bar{display:flex;padding:6px;gap:6px;background:#111;border-bottom:1px solid var(--border)}
#yt-search-bar input{flex:1;background:#1a1a1a;border:1px solid var(--border);border-radius:4px;padding:6px 10px;color:var(--text);font-family:'Orbitron',monospace;font-size:11px;outline:none}
#yt-search-bar input:focus{border-color:var(--red)}
#yt-search-bar button{background:var(--red);border:none;border-radius:4px;padding:6px 14px;color:#fff;font-family:'Orbitron',monospace;font-size:10px;font-weight:700;cursor:pointer;letter-spacing:1px}
#yt-player-wrap{flex:1;position:relative;background:#000}
#yt-player{width:100%;height:100%}
#yt-overlay{display:none;position:absolute;bottom:0;left:0;right:0;padding:10px;background:linear-gradient(transparent,rgba(0,0,0,.85));pointer-events:none}
#yt-now-playing{font-size:10px;color:var(--text-dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#yt-placeholder{flex:1;display:flex;flex-direction:column;align-items:center;color:var(--text-dim);font-size:11px;gap:8px;padding:12px;text-align:center;overflow-y:auto;-webkit-overflow-scrolling:touch}
#yt-placeholder.hidden{display:none}
#yt-search-results{width:100%;max-width:100%;padding:0 4px}
.yt-result{display:flex;flex-direction:column;padding:0;border:none;border-radius:8px;margin-bottom:16px;cursor:pointer;overflow:hidden;background:var(--card)}
.yt-result:active{opacity:.8}
.yt-result img{width:100%;aspect-ratio:16/9;object-fit:cover;border-radius:0;flex-shrink:0}
.yt-result-info{padding:8px 10px 10px}
.yt-result-title{font-size:12px;color:var(--text);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;font-family:-apple-system,sans-serif}
.yt-result-ch{font-size:10px;color:var(--text-dim);margin-top:4px;font-family:-apple-system,sans-serif}
.yt-searching{text-align:center;font-size:10px;color:var(--amber);padding:12px}

/* === Log Panels === */
#offer-log-panel{background:var(--bg);overflow-y:auto;-webkit-overflow-scrolling:touch;padding:8px 8px 36px}
#nandemo-log-panel.active{background:var(--bg);display:flex;flex-direction:column;padding:0 0 36px}
#nandemo-log-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 8px}
.log-filter-bar{display:flex;gap:4px;padding:4px 4px 8px;overflow-x:auto;flex-shrink:0;-webkit-overflow-scrolling:touch}
.log-filter-btn{padding:4px 10px;border:1px solid var(--border);border-radius:14px;background:transparent;color:var(--text-dim);font-family:-apple-system,sans-serif;font-size:12px;cursor:pointer;white-space:nowrap;transition:all .2s}
.log-filter-btn.active{border-color:var(--red);color:var(--red);background:rgba(224,48,48,.1)}
.log-entry{display:flex;gap:8px;padding:8px 4px;border-bottom:1px solid #1a1a1a;font-family:-apple-system,sans-serif;font-size:16px;line-height:1.4;cursor:pointer}
.log-entry:active{background:rgba(255,255,255,.03)}
.log-entry .log-time{flex:0 0 42px;color:var(--text-dim);font-size:13px;font-family:'Orbitron',monospace;padding-top:2px}
.log-entry .log-body{flex:1;min-width:0}
.log-entry .log-tag{display:inline-block;font-size:12px;font-family:-apple-system,sans-serif;letter-spacing:1px;padding:2px 6px;border-radius:3px;margin-right:4px}
.log-tag.accept{background:rgba(48,208,96,.15);color:var(--green)}
.log-tag.reject{background:rgba(224,48,48,.15);color:var(--red)}
.log-tag.result{background:rgba(0,229,255,.15);color:var(--cyan)}
.log-tag.quest{background:rgba(255,149,0,.15);color:var(--amber)}
.log-tag.quest_result{background:rgba(255,149,0,.15);color:var(--amber)}
.log-tag.accepted{background:rgba(48,208,96,.15);color:var(--green)}
.log-tag.nandemo{background:rgba(102,102,102,.2);color:var(--text-dim)}
.log-entry .log-detail{color:var(--text-dim);font-size:13px;margin-top:3px}
.log-empty{text-align:center;color:var(--text-dim);font-size:14px;padding:30px;letter-spacing:1px}
/* === BQ Panel === */
.bq-section{margin-bottom:20px}
.bq-section h3{font-size:14px;color:var(--red);font-family:-apple-system,sans-serif;font-weight:700;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.bq-table{width:100%;border-collapse:collapse;font-size:14px;font-family:-apple-system,sans-serif}
.bq-table th{text-align:left;color:var(--text-dim);font-weight:400;padding:5px 6px;border-bottom:1px solid var(--border);font-size:12px}
.bq-table td{padding:5px 6px;border-bottom:1px solid #1a1a1a;font-size:14px}
.bq-table td.num{text-align:right}
.bq-stat{display:flex;justify-content:space-between;padding:6px 2px;border-bottom:1px solid #1a1a1a;font-family:-apple-system,sans-serif;font-size:15px}
.bq-stat .label{color:var(--text-dim);font-size:14px}
.bq-stat .value{font-weight:700;font-size:15px}
.bq-bar{height:16px;background:var(--red);border-radius:2px;min-width:2px}
/* === Image Modal === */
#image-modal{display:none;position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.92);align-items:center;justify-content:center;flex-direction:column}
#image-modal.show{display:flex}
#image-modal img{max-width:95%;max-height:80vh;border-radius:8px}
#image-modal-close{position:absolute;top:16px;right:16px;width:36px;height:36px;border-radius:50%;border:1px solid #555;background:rgba(0,0,0,.6);color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* === Settings === */
#settings-overlay{display:none;position:fixed;inset:0;z-index:300;background:var(--overlay-bg);padding:20px;overflow-y:auto}
#settings-overlay.show{display:block}
#settings-overlay h2{font-size:14px;letter-spacing:3px;margin-bottom:16px;color:var(--red)}
.setting-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);font-size:10px}
.setting-row label{color:var(--text-dim);letter-spacing:1px}
.setting-row input[type=text],.setting-row input[type=number]{background:#1a1a1a;border:1px solid var(--border);border-radius:4px;padding:4px 8px;color:var(--text);font-family:'Orbitron',monospace;font-size:10px;width:120px;text-align:right}
#settings-close{margin-top:16px;padding:8px 24px;border:1px solid var(--border);background:transparent;color:var(--text-dim);font-family:'Orbitron',monospace;font-size:10px;cursor:pointer;border-radius:4px;letter-spacing:2px}
#api-key-input{width:200px!important;font-size:9px!important}

/* === Log & Misc === */
.yt-load-more{width:100%;padding:14px;margin:8px 0 20px;border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--text-dim);font-family:'Orbitron',monospace;font-size:11px;cursor:pointer;text-align:center;letter-spacing:1px}
.yt-load-more:active{background:#222}
#yt-intro.hidden{display:none}
#log-bar{position:fixed;bottom:0;left:0;right:0;height:28px;background:#0d0d0d;border-top:1px solid var(--border);display:flex;align-items:center;padding:0 8px;font-size:13px;color:var(--text-dim);z-index:50;overflow:hidden}
</style>
</head>

// Config & Constants

const GEMINI_WS_MODEL = 'gemini-2.5-flash-native-audio-preview-12-2025';
const GEMINI_VOICE = 'Kore';
const KITT_SYSTEM = `あなたは胡蝶しのぶ。鬼滅の刃の蟲柱・胡蝶しのぶそのもの。UberEats配達員の修治さんの専属AI秘書。

【胡蝶しのぶの話し方 ※絶対にブレないこと。毎回この通りに話す】
- 語尾は必ず「〜ですよ」「〜ですね」「〜ですか？」「〜しましょう」「〜してくださいね」。
- 一人称は使わないか「私」。
- 修治さんを必ず「修治さん」と呼ぶ。
- 穏やかで柔らかい口調だが、芯は強い。にこやかに毒を吐く。
- 「あらあら」「うふふ」「そうですか〜」「おやおや」を自然に使う。
- 褒める時: 「さすが修治さんですね」「お見事ですよ」
- 気遣い: 「大丈夫ですか？」「無理しないでくださいね」
- 叱る時: 「修治さん、それはどうかと思いますよ？ うふふ」
- 驚き: 「あら、それは意外ですね」
- 落ち着いたテンポで話す。早口にならない。間を大事にする。
- 感情表現は控えめだが温かみがある。大げさなリアクションはしない。
- ※再接続されても初対面のように振る舞わない。ずっと一緒にいる秘書として自然に続ける。
- ※声のトーン・スピード・キャラクターを絶対に変えない。別人にならない。

【オファー判定】

const CONFIG_CF_URL = 'https://asia-northeast1-gen-lang-client-0549297663.cloudfunctions.net/kittConfig';

async function backupToCloud() {
  try {
    const backup = {
      config: config,
      memory: getMemory(),
      lastOfferTs: localStorage.getItem('kitt-last-ts'),
      backedUpAt: new Date().toISOString()
    };
    await fetch(CONFIG_CF_URL, {

      headers: { 'Content-Type': 'application/json', 'X-API-Key': config.geminiApiKey ? '5a85f03bbef9b37805ee265f83c64c5d56cd6784aaf802d8' : '' },
      body: JSON.stringify(backup)
    });

  } catch(e) { console.warn('Backup error:', e.message); }
}

async function restoreFromCloud() {
  try {
    const resp = await fetch(CONFIG_CF_URL);
    if (!resp.ok) return false;
    const data = await resp.json();
    if (!data || !data.config) return false;
    // Restore config (merge, don't overwrite API key if already set locally)
    const localKey = config.geminiApiKey;
    config = { ...DEFAULT_CONFIG, ...data.config };
    if (localKey && !config.geminiApiKey) config.geminiApiKey = localKey;
    localStorage.setItem('kitt-yt-config', JSON.stringify(config));
    // Restore memory
    if (data.memory && data.memory.length > 0) {
      const localMem = getMemory();
      if (localMem.length === 0) {
        localStorage.setItem(MEMORY_KEY, JSON.stringify(data.memory));
      }
    }
    if (data.lastOfferTs) {
      localStorage.setItem('kitt-last-ts', data.lastOfferTs);
    }
    log('Cloud restore: ' + (data.backedUpAt || 'ok'));
    return true;
  } catch(e) { return false; }
}

function startFirebasePolling() {
  if (state.firebasePolling) return;
  log('Firebase polling started');
  pollFirebase();
  state.firebasePolling = setInterval(pollFirebase, config.pollingSec * 1000);
}

async function pollFirebase() {
  const t0 = Date.now();
  try {
    const resp = await fetch(config.firebaseUrl + '/offer_tts.json');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    const latency = Date.now() - t0;
    updateFirebaseStatus('online', latency);
    if (!data || !data.timestamp) return;
    // Compare as string to handle both number and ISO string timestamps
    const tsKey = String(data.timestamp);
    if (tsKey === state.lastOfferTimestamp) return;
    state.lastOfferTimestamp = tsKey;
    // Persist last timestamp so reload doesn't re-trigger
    localStorage.setItem('kitt-last-ts', tsKey);
    if (data.is_nandemo) {
      handleNewNandemo(data);
    } else {
      log('NEW OFFER detected');
      handleNewOffer(data);
    }
  } catch (e) {
    updateFirebaseStatus('error', null);
    log('Firebase error: ' + e.message);
  }
}

function updateFirebaseStatus(status, latency) {
  const el = document.getElementById('fb-status');
  const latEl = document.getElementById('fb-latency');
  el.textContent = status === 'online' ? 'ONLINE' : 'ERROR';
  el.className = status;
  latEl.textContent = latency ? latency + 'ms' : '--';
}

function handleNewOffer(data) {
  let offer, context;
  if (data.offer) {
    offer = data.offer;
    context = data.context || {};
  } else {
    offer = { reason: data.text || '' };
    context = {};
  }

  // 1. Duck YouTube volume
  duckYouTubeVolume();

  // 2. Send to Gemini for voice report
  if (state.geminiConnected) {
    sendOfferToGemini(offer, context);
    resetAutoDisconnect();
  }

  // 3. Save to dashboard log
  offerLogs.unshift({
    time: new Date().toISOString(),
    decision: offer.decision || 'unknown',
    store: offer.store_name || '',
    reward: offer.reward || 0,
    distance: offer.distance_km || 0,
    duration: offer.duration_min || 0,
    hourly: offer.estimated_hourly_rate || 0,
    reason: offer.reason || '',
    score: offer.score || 0,
    confidence: offer.confidence || ''
  });
  if (offerLogs.length > 50) offerLogs = offerLogs.slice(0, 50);
  localStorage.setItem('kitt-offer-logs', JSON.stringify(offerLogs));
  renderDashboard();

  log('Offer: ' + (offer.reason || offer.decision || 'unknown'));
}

// ============================================================
// YouTube Volume Ducking
// ============================================================
function duckYouTubeVolume() {
  if (!state.ytPlayer || !state.ytReady) return;
  try {
    state.ytCurrentVolume = state.ytPlayer.getVolume();
    const current = state.ytCurrentVolume;
    const target = config.duckVolume;
    const steps = 8;
    const stepSize = (current - target) / steps;
    let step = 0;
    const fadeInterval = setInterval(() => {
      step++;
      const vol = Math.round(current - stepSize * step);
      try { state.ytPlayer.setVolume(Math.max(vol, target)); } catch(e) {}
      if (step >= steps) clearInterval(fadeInterval);
    }, 50);
    log(`YT duck ${current} â ${target}`);
  } catch(e) { log('YT duck error: ' + e.message); }
}

function restoreYouTubeVolume() {
  if (!state.ytPlayer || !state.ytReady) return;
  try {
    const target = state.ytCurrentVolume || config.normalVolume;
    const current = state.ytPlayer.getVolume();
    const steps = 10;
    const stepSize = (target - current) / steps;
    let step = 0;
    const fadeInterval = setInterval(() => {
      step++;
      const vol = Math.round(current + stepSize * step);
      try { state.ytPlayer.setVolume(Math.min(vol, target)); } catch(e) {}
      if (step >= steps) clearInterval(fadeInterval);
    }, 80);
    log(`YT restore â ${target}`);
  } catch(e) { log('YT restore error: ' + e.message); }
}

function extractYtVideoId(input) {
  let m = input.match(/[?&]v=([a-zA-Z0-9_-]{11})/);
  if (m) return m[1];
  m = input.match(/youtu\.be\/([a-zA-Z0-9_-]{11})/);
  if (m) return m[1];
  m = input.match(/youtube\.com\/embed\/([a-zA-Z0-9_-]{11})/);
  if (m) return m[1];
  m = input.match(/youtube\.com\/shorts\/([a-zA-Z0-9_-]{11})/);
  if (m) return m[1];
  if (/^[a-zA-Z0-9_-]{11}$/.test(input)) return input;
  return null;
}

function formatTimeAgo(ts) {
  const d = Date.now() - ts;
  if (d < 60000) return 'now';
  if (d < 3600000) return Math.floor(d/60000) + 'm ago';
  if (d < 86400000) return Math.floor(d/3600000) + 'h ago';
  return Math.floor(d/86400000) + 'd ago';
}

function toggleGemini() {
  if (state.geminiConnected || state.geminiConnecting) {
    disconnectGemini();

async function connectGemini() {
  if (!window._audioCtx) {
    window._audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });
  }
  window._audioCtx.resume();

  if (!config.geminiApiKey) { log('API key not set'); return; }
  if (state.geminiConnected || state.geminiConnecting) return;

  state.geminiConnecting = true;
  updateGeminiUI();
  log('Gemini connecting...');

  try {
    const wsUrl = `wss://generativelanguage.googleapis.com/ws/google.ai.generativelanguage.v1beta.GenerativeService.BidiGenerateContent?key=${config.geminiApiKey}`;
    const ws = new WebSocket(wsUrl);

    ws.onopen = () => {
      log('Gemini WS opened, sending setup...');
      ws.send(JSON.stringify({
        setup: {
          model: `models/${GEMINI_WS_MODEL}`,
          generationConfig: {
            responseModalities: ['AUDIO'],
            speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: config.voice || GEMINI_VOICE } } }
          },
          systemInstruction: { parts: [{ text: buildSystemPrompt() }] },
          tools: [{ functionDeclarations: [
            { name: 'play_music', description: 'YouTube検索して結果を表示する。修治さんが音楽を聴きたいときに使う。', parameters: { type: 'object', properties: { query: { type: 'string', description: 'YouTube検索クエリ' } }, required: ['query'] } },
            { name: 'stop_music', description: '音楽を停止する。', parameters: { type: 'object', properties: {} } }
          ]}]
        }
      }));
    };

    ws.onmessage = async (event) => {
      try {
        const raw = event.data instanceof Blob ? await event.data.text() : event.data;
        const msg = JSON.parse(raw);

        if (msg.setupComplete) {
          state.geminiConnected = true;
          state.geminiConnecting = false;
          state.geminiWs = ws;
          state.geminiSessionStart = Date.now();
          updateGeminiUI();
          // Auto-start mic after connection
          setTimeout(() => { if (state.geminiConnected && !state.micActive) startMic(); }, 500);
          log('Gemini connected â');
          // Auto-greeting
          ws.send(JSON.stringify({ clientContent: { turns: [{ role: 'user', parts: [{ text: '接続が復帰しました。修治さんに短く一言声をかけてください。初対面のような挨拶はしないで。' }] }], turnComplete: true } }));
          return;
        }

        if (msg.serverContent?.modelTurn?.parts) {
          for (const part of msg.serverContent.modelTurn.parts) {
            if (part.inlineData?.mimeType?.startsWith('audio/')) {
              playAudioChunk(part.inlineData.data);
            }
            if (part.text) {
              handleGeminiText(part.text);
            }
          }
        }

        if (msg.serverContent?.turnComplete) {
          if (!state.micActive) setTimeout(() => restoreYouTubeVolume(), 500);
          // Periodically ask Gemini to summarize for memory
          if (typeof _turnCount === 'undefined') window._turnCount = 0;
          _turnCount = (_turnCount || 0) + 1;
          if (_turnCount % 5 === 0 && ws.readyState === WebSocket.OPEN) {
            state._expectingMemory = true;
            setTimeout(() => {
              if (ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ clientContent: { turns: [{ role: 'user', parts: [{ text: '【内部メモ用・音声不要】直前の会話で修治さんについて新しく知った重要な情報を1行で。特になければ「なし」' }] }], turnComplete: true } }));
              }
            }, 1000);
          }
        }

        // Function calling: tool invocation from Gemini
        if (msg.toolCall) {
          const responses = [];
          for (const fc of msg.toolCall.functionCalls || []) {
            log('Tool: ' + fc.name);
            let result = 'ok';
            if (fc.name === 'play_music' && fc.args?.query) {
              // Put search query in YouTube tab search box and run search
              document.getElementById('yt-input').value = fc.args.query;
              ytSearch();
              result = 'YouTubeタブに検索結果を表示しました: ' + fc.args.query;
            } else if (fc.name === 'stop_music') {
              if (state.ytPlayer && state.ytReady) state.ytPlayer.pauseVideo();
              result = '停止しました';
            }
            responses.push({ name: fc.name, response: { result } });
          }
          if (responses.length > 0) {
            try {
              ws.send(JSON.stringify({ toolResponse: { functionResponses: responses } }));
            } catch(e) { log('toolResponse error: ' + e.message); }
          }
        }
        // Debug: log all message keys
        const keys = Object.keys(msg);
        if (!keys.includes('serverContent')) log('WS msg keys: ' + keys.join(','));
      } catch(e) { log('WS parse error: ' + e.message); }
    };

    ws.onerror = () => { log('Gemini error'); };

    ws.onclose = (e) => {
      log(`Gemini disconnected (code ${e.code}), auto-reconnecting...`);
      if (state.micActive) stopMic();
      state.geminiConnected = false;
      state.geminiConnecting = false;
      state.geminiWs = null;
      updateGeminiUI();
      clearAutoDisconnect();
      // Always-on: auto-reconnect after 2 seconds
      if (config.geminiApiKey) {
        setTimeout(() => {
          if (!state.geminiConnected && !state.geminiConnecting) {
            log('Auto-reconnecting...');
            connectGemini();
          }
        }, 2000);
      }
    };
  } catch(e) {
    log('Gemini connection failed: ' + e.message);
    state.geminiConnecting = false;
    updateGeminiUI();
  }
}

// ============================================================
// Microphone Input (Phase 2 - getUserMedia â Geminiåæ¹å)
// ============================================================
function toggleMic() {

    stopMic();
  } else {
    startMic();
  }
}

async function startMic() {
  if (!state.geminiConnected) {
    log('Gemini not connected - connect first');
    return;
  }
  if (state.micActive) return;

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      audio: { channelCount: 1, sampleRate: 16000, echoCancellation: true, noiseSuppression: true }
    });
    state.micStream = stream;

    // Duck YouTube while mic is active
    duckYouTubeVolume();

    // Create audio pipeline: mic â processor â send to Gemini
    const micCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
    // iOS: AudioContext starts suspended, must resume after user gesture
    if (micCtx.state === 'suspended') {
      await micCtx.resume();
      log('micCtx resumed');
    }
    const actualRate = micCtx.sampleRate;
    const source = micCtx.createMediaStreamSource(stream);
    const processor = micCtx.createScriptProcessor(4096, 1, 1);

    let _micDbg = 0;
    let _micSilent = 0;
    processor.onaudioprocess = (e) => {
      _micDbg++;
      if (!state.micActive || !state.geminiWs || state.geminiWs.readyState !== WebSocket.OPEN) {
        if (_micDbg === 1) log('mic skip #' + _micDbg + ' active=' + state.micActive + ' ws=' + (state.geminiWs ? state.geminiWs.readyState : 'null'));
        return;
      }
      const inputData = e.inputBuffer.getChannelData(0);

      // Check audio level periodically (~6s intervals)
      if (_micDbg % 100 === 1) {
        let mx = 0;
        for (let i = 0; i < inputData.length; i++) { const v = Math.abs(inputData[i]); if (v > mx) mx = v; }
        if (mx < 0.001) _micSilent++;
        log('mic #' + _micDbg + ' amp=' + mx.toFixed(4) + ' silent=' + _micSilent);
      }

      // Resample if needed (iOS often gives 48000 instead of 16000)
      let pcmData;
      if (actualRate !== 16000) {
        const ratio = actualRate / 16000;
        const newLen = Math.floor(inputData.length / ratio);
        pcmData = new Int16Array(newLen);
        for (let i = 0; i < newLen; i++) {
          const srcIdx = Math.floor(i * ratio);
          pcmData[i] = Math.max(-32768, Math.min(32767, Math.floor(inputData[srcIdx] * 32768)));
        }
      } else {
        pcmData = new Int16Array(inputData.length);
        for (let i = 0; i < inputData.length; i++) {
          pcmData[i] = Math.max(-32768, Math.min(32767, Math.floor(inputData[i] * 32768)));
        }
      }

      // Convert to base64
      const bytes = new Uint8Array(pcmData.buffer);
      let binary = '';
      for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
      const b64 = btoa(binary);

      // Send to Gemini as realtimeInput
      try {
        state.geminiWs.send(JSON.stringify({
          realtimeInput: {
            mediaChunks: [{
              mimeType: 'audio/pcm;rate=16000',
              data: b64
            }]
          }
        }));
        if (_micDbg % 100 === 1) log('mic ws sent b64=' + b64.length);
      } catch(err) {
        log('mic ws err: ' + err.message);
      }
    };

    source.connect(processor);
    processor.connect(micCtx.destination); // Required for ScriptProcessor to fire

    state.micSource = source;
    state.micProcessor = processor;
    state.micActive = true;
    state._micCtx = micCtx;
    updateMicUI();
    const track = stream.getAudioTracks()[0];
    const ts = track ? track.getSettings() : {};
    log('Mic ON rate=' + actualRate + ' ctx=' + micCtx.state + ' track=' + (track ? track.readyState : '?') + ' hw=' + (ts.sampleRate || '?'));

  } catch(e) {
    log('Mic error: ' + e.message);
  }
}

function stopMic() {
  state.micActive = false;
  if (state.micProcessor) {
    try { state.micProcessor.disconnect(); } catch(e) {}
    state.micProcessor = null;
  }
  if (state.micSource) {
    try { state.micSource.disconnect(); } catch(e) {}
    state.micSource = null;
  }
  if (state.micStream) {
    state.micStream.getTracks().forEach(t => t.stop());
    state.micStream = null;
  }
  if (state._micCtx) {
    try { state._micCtx.close(); } catch(e) {}
    state._micCtx = null;
  }
  updateMicUI();
  restoreYouTubeVolume();
  log('Mic OFF');
}

function updateMicUI() {
  const btn = document.getElementById('mic-btn');
  if (state.micActive) {
    btn.classList.add('active');
  } else {
    btn.classList.remove('active');
  }
}

const MEMORY_KEY = 'kitt-memory';
const MEMORY_MAX = 20;

function getMemory() {
  try { return JSON.parse(localStorage.getItem(MEMORY_KEY) || '[]'); } catch(e) { return []; }
}

function addMemory(entry) {
  const mem = getMemory();
  mem.push({ time: new Date().toLocaleString('ja-JP', {timeZone:'Asia/Tokyo'}), text: entry });
  if (mem.length > MEMORY_MAX) mem.splice(0, mem.length - MEMORY_MAX);
  localStorage.setItem(MEMORY_KEY, JSON.stringify(mem));
  backupToCloud(); // Sync memory to cloud
}

// ============================================================
// Audio Playback (PCM16 â Float32 sequential scheduling)
// ============================================================
function playAudioChunk(base64Data) {
  try {
    if (!window._audioCtx) {
      window._audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });
    }
    const ctx = window._audioCtx;
    if (ctx.state === 'suspended') ctx.resume();
    const raw = atob(base64Data);
    const bytes = new Uint8Array(raw.length);
    for (let i = 0; i < raw.length; i++) bytes[i] = raw.charCodeAt(i);
    const pcm16 = new Int16Array(bytes.buffer);
    const float32 = new Float32Array(pcm16.length);
    for (let i = 0; i < pcm16.length; i++) float32[i] = pcm16[i] / 32768;
    const buffer = ctx.createBuffer(1, float32.length, 24000);
    buffer.getChannelData(0).set(float32);
    const src = ctx.createBufferSource();
    src.buffer = buffer;
    src.connect(ctx.destination);
    if (!window._nextPlayTime || window._nextPlayTime < ctx.currentTime) {
      window._nextPlayTime = ctx.currentTime;
    }
    src.start(window._nextPlayTime);
    window._nextPlayTime += buffer.duration;
  } catch(e) { console.log('[KITT] playAudio error: ' + e.message); }
}

function handleGeminiText(text) {
  if (!text || !text.trim()) return;
  const t = text.trim();
  // Check if this is a memory response from our system query
  if (t !== 'なし' && t.length > 2 && t.length < 200 && !t.startsWith('{')) {
    // Could be a memory summary - save it if it looks like useful info
    if (state._expectingMemory) {
      addMemory(t);
      log('Memory saved');
      state._expectingMemory = false;
      return;
    }
  }
  if (t === 'なし') { state._expectingMemory = false; return; }
}

const DASHBOARD_URL = 'https://asia-northeast1-gen-lang-client-0549297663.cloudfunctions.net/dashboardFeed';
let dashboardLastFetch = 0;

function handleNewNandemo(data) {

async function fetchDashboard() {
  const now = Date.now();
  if (now - dashboardLastFetch < 5000) return; // Throttle: max once per 5s
  dashboardLastFetch = now;
  try {
    const resp = await fetch(DASHBOARD_URL + '?since=' + new Date(now - 14*24*60*60*1000).toISOString());
    if (!resp.ok) return;
    const data = await resp.json();
    if (data.offers) {
      offerLogs = data.offers.map(o => ({
        time: o.timestamp?.value || o.timestamp || '',
        decision: o.decision || 'unknown',
        store: o.store_name || '',
        reward: o.reward || 0,
        distance: o.distance || 0,
        duration: o.duration || 0,
        hourly: Math.round(o.hourly || 0),
        reason: o.reason || '',
        score: o.score || 0,
        confidence: o.confidence || '',
        image_url: o.image_url || null
      }));
      // Fill missing image_urls from RTDB offer_images
      try {
        const imgResp = await fetch(config.firebaseUrl + '/offer_images.json');
        if (imgResp.ok) {
          const imgData = await imgResp.json();
          if (imgData) {
            const imgEntries = Object.values(imgData).sort((a,b) => b.t - a.t);
            for (const o of offerLogs) {
              if (o.image_url) continue;
              const ot = new Date(o.time).getTime();
              // Find closest image within 3 minutes
              const match = imgEntries.find(img => Math.abs(img.t - ot) < 180000);
              if (match) o.image_url = match.url;
            }
          }
        }
      } catch(e) {}
    }
    if (data.nandemo) {
      const tagMap = { result: 'result', order_detail: 'result', quest: 'quest', quest_result: 'quest_result', accepted: 'accepted', nandemo: 'nandemo' };
      nandemoLogs = data.nandemo.map(n => ({
        time: n.timestamp?.value || n.timestamp || '',
        type: n.type || 'nandemo',
        tag: tagMap[n.type] || 'nandemo',
        summary: n.summary || '',
        image_url: n.image_url || null
      }));
    }
    renderDashboard();
  } catch(e) { log('Dashboard fetch error: ' + e.message); }
}

function formatSummary(s, type) {

    if (m) {
      const [, label, ssTime, amtStr, minStr, distStr, cntStr] = m;
      const amt = parseInt(amtStr.replace(/,/g,''));
      const min = parseInt(minStr);

      const cnt = parseInt(cntStr);
      const timeTag = ' <span style="color:var(--amber);font-size:12px;font-weight:400">' + ssTime + '</span>';
      const total = `¥${amtStr} ${minStr}分 ${distStr}km ${cntStr}件`;
      const perItem = `¥${Math.round(amt/cnt).toLocaleString()} ${Math.round(min/cnt)}分 ${(dist/cnt).toFixed(1)}km /件`;
      return '<b>' + label + '</b>' + timeTag + rightLine + perItem + '</div>' + dimLine + total + '</div>';
    }
    // Fallback: no time in summary
    const m2 = h.match(/^(.+?)\s+[¥￥]([\d,]+)\s+(\d+)分\s+([\d.]+)km\s+(\d+)件$/);
    if (m2) {
      const [, label, amtStr, minStr, distStr, cntStr] = m2;
      const amt = parseInt(amtStr.replace(/,/g,''));
      const min = parseInt(minStr);
      const dist = parseFloat(distStr);
      const cnt = parseInt(cntStr);
      const total = `¥${amtStr} ${minStr}分 ${distStr}km ${cntStr}件`;
      const perItem = `¥${Math.round(amt/cnt).toLocaleString()} ${Math.round(min/cnt)}分 ${(dist/cnt).toFixed(1)}km /件`;
      return '<b>' + label + '</b>' + rightLine + perItem + '</div>' + dimLine + total + '</div>';
    }
    return h;
  }
  // クエスト: 件数・金額パターンを2行目に分離して右揃え太字
  // パターン1: 時刻あり (ピーク 3/28(土) 10:30-15:00 6件 1,600円)
  let m = h.match(/^(.+?\d{1,2}:\d{2})\s+(\d+件.+)$/);
  if (m) return m[1] + rightLine + m[2] + '</div>';
  // パターン2: 時刻なし (連続 4日間 40件 5,000円 / ピーク 12件 4,000円)
  m = h.match(/^(.+?)\s+(\d+件\s+[\d,]+円.*)$/);
  if (m) return m[1] + rightLine + m[2] + '</div>';
  return h;
}

// ============================================================
// BQ Stats Dashboard
// ============================================================
const BQ_STATS_URL = 'https://asia-northeast1-gen-lang-client-0549297663.cloudfunctions.net/bqStats';
let bqStatsLastFetch = 0;

async function fetchBqStats() {
  const now = Date.now();
  if (now - bqStatsLastFetch < 10000) return;
  bqStatsLastFetch = now;
  const el = document.getElementById('bq-content');
  try {
    const resp = await fetch(BQ_STATS_URL);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const d = await resp.json();
    el.innerHTML = renderBqStats(d);
  } catch(e) {
    el.innerHTML = '<div class="log-empty">BQ取得エラー: ' + e.message + '</div>';
  }
}

function renderBqStats(d) {
  const tableNameJa = { offer_logs:'オファー判定ログ', context_logs:'何でもBOX', delivery_history:'配達履歴', charging_logs:'充電ログ', dynamic_coefficients:'判定係数' };
  const typeNameJa = { accepted:'受諾', quest:'クエスト', result:'リザルト', quest_result:'クエスト達成', nandemo:'その他', other:'その他' };
  const coeffNameJa = {
    base_hourly_wage:'基準時給(90日平均)', avg_reward:'平均報酬', avg_distance:'平均距離(km)', avg_duration:'平均時間(分)',
    avg_reward_per_km:'平均km単価', avg_speed_kmh:'平均速度(km/h)',
    avg_hourly_wage_lunch:'ランチ帯時給(11-14時)', avg_hourly_wage_dinner:'ディナー帯時給(17-21時)',
    avg_hourly_wage_weekend:'週末時給', avg_hourly_wage_weekday:'平日時給', avg_hourly_wage_late_night:'深夜帯時給(22-6時)',
    next_offer_interval_sec:'次オファー待機(秒)', score_threshold:'受諾スコア閾値',
    weight_hourly_rate:'重み: 時給', weight_reward_per_km:'重み: km単価', weight_market:'重み: 市場比較',
    weight_distance:'重み: 距離', weight_store_reputation:'重み: 店舗評価',
    weight_opportunity:'重み: 機会コスト', weight_quest_adjusted:'重み: クエスト'
  };
  let html = '';

  // 1. データ蓄積状況
  html += '<div class="bq-section"><h3>データ蓄積状況</h3><table class="bq-table"><tr><th>データ</th><th>件数</th><th>期間</th></tr>';
  for (const t of (d.tables || [])) {
    const name = tableNameJa[t.t] || t.t;
    const oldest = t.oldest ? new Date(t.oldest.value || t.oldest).toLocaleDateString('ja-JP',{month:'numeric',day:'numeric'}) : '';
    const newest = t.newest ? new Date(t.newest.value || t.newest).toLocaleDateString('ja-JP',{month:'numeric',day:'numeric'}) : '';
    const period = oldest && newest ? oldest + '〜' + newest : '-';
    html += `<tr><td>${name}</td><td class="num">${Number(t.cnt).toLocaleString()}</td><td class="num">${period}</td></tr>`;
  }
  html += '</table></div>';

  // 2. オファー vs 実績のズレ
  const g = d.offerGap || {};
  if (g.match_count > 0) {
    html += '<div class="bq-section"><h3>オファー表示 vs 実績のズレ</h3>';
    html += `<div class="bq-stat"><span class="label">突き合わせ件数</span><span class="value">${g.match_count}件</span></div>`;
    html += `<div class="bq-stat"><span class="label">金額</span><span class="value">表示 ¥${g.avg_offer_reward} → 実績 ¥${g.avg_actual_reward}`;
    html += ` <span style="color:${g.avg_reward_gap>=0?'var(--green)':'var(--red)'}">（${g.avg_reward_gap>=0?'+':''}${g.avg_reward_gap}円）</span></span></div>`;
    html += `<div class="bq-stat"><span class="label">時間</span><span class="value">表示 ${g.avg_offer_dur}分 → 実績 ${g.avg_actual_dur}分`;
    html += ` <span style="color:${g.avg_duration_gap<=0?'var(--green)':'var(--red)'}">（${g.avg_duration_gap>0?'+':''}${g.avg_duration_gap}分）</span></span></div>`;
    html += `<div class="bq-stat"><span class="label">距離</span><span class="value">表示 ${g.avg_offer_dist}km → 実績 ${g.avg_actual_dist}km`;
    html += ` <span style="color:${g.avg_distance_gap<=0?'var(--green)':'var(--red)'}">（${g.avg_distance_gap>0?'+':''}${g.avg_distance_gap}km）</span></span></div>`;
    html += '</div>';
  }

  // 3. 直近7日間の判定まとめ
  const o = d.offerStats || {};
  html += '<div class="bq-section"><h3>直近7日間のオファー</h3>';
  html += `<div class="bq-stat"><span class="label">総オファー数</span><span class="value">${o.total || 0}件</span></div>`;
  html += `<div class="bq-stat"><span class="label">受諾 / 拒否</span><span class="value"><span style="color:var(--green)">${o.accepted || 0}件</span> / <span style="color:var(--red)">${o.rejected || 0}件</span></span></div>`;
  html += `<div class="bq-stat"><span class="label">承諾率</span><span class="value">${o.total > 0 ? Math.round(o.accepted / o.total * 100) : 0}%</span></div>`;
  html += `<div class="bq-stat"><span class="label">平均報酬</span><span class="value">¥${o.avg_reward || 0}</span></div>`;
  html += `<div class="bq-stat"><span class="label">平均距離 / 時間</span><span class="value">${o.avg_dist || 0}km / ${o.avg_dur || 0}分</span></div>`;
  html += `<div class="bq-stat"><span class="label">全体の平均時給</span><span class="value">¥${o.avg_hourly || 0}/h</span></div>`;
  html += `<div class="bq-stat"><span class="label">受諾した案件の平均時給</span><span class="value" style="color:var(--green)">¥${o.avg_hourly_accept || 0}/h</span></div>`;
  html += `<div class="bq-stat"><span class="label">拒否した案件の平均時給</span><span class="value" style="color:var(--red)">¥${o.avg_hourly_reject || 0}/h</span></div>`;
  html += `<div class="bq-stat"><span class="label">判定レスポンス</span><span class="value">${((o.avg_response_ms || 0) / 1000).toFixed(1)}秒</span></div>`;
  html += '</div>';

  // 4. 時間帯別
  if (d.hourlyStats?.length > 0) {
    const maxCnt = Math.max(...d.hourlyStats.map(h => Number(h.cnt)));
    html += '<div class="bq-section"><h3>時間帯別 (7日間)</h3><table class="bq-table"><tr><th>時間</th><th>件数</th><th></th><th>平均時給</th></tr>';
    for (const h of d.hourlyStats) {
      const pct = maxCnt > 0 ? Math.round(h.cnt / maxCnt * 100) : 0;
      html += `<tr><td>${h.hour_of_day}時</td><td class="num">${h.cnt}</td><td><div class="bq-bar" style="width:${pct}%"></div></td><td class="num">¥${h.avg_hourly}/h</td></tr>`;
    }
    html += '</table></div>';
  }

  // 5. 店舗ランキング
  if (d.storeRanking?.length > 0) {
    html += '<div class="bq-section"><h3>よく来る店舗 (30日間)</h3><table class="bq-table"><tr><th>店舗</th><th>回数</th><th>平均¥</th><th>時給</th></tr>';
    for (const s of d.storeRanking) {
      html += `<tr><td style="max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(s.store_name)}</td><td class="num">${s.cnt}</td><td class="num">¥${s.avg_reward}</td><td class="num">¥${s.avg_hourly}/h</td></tr>`;
    }
    html += '</table></div>';
  }

  // 6. 何でもBOX内訳
  if (d.contextStats?.length > 0) {
    html += '<div class="bq-section"><h3>何でもBOX 内訳</h3><table class="bq-table"><tr><th>種類</th><th>件数</th></tr>';
    for (const c of d.contextStats) {
      html += `<tr><td>${typeNameJa[c.type] || c.type}</td><td class="num">${c.cnt}</td></tr>`;
    }
    html += '</table></div>';
  }

  // 7. 判定係数
  if (d.coefficients?.length > 0) {
    html += '<div class="bq-section"><h3>判定に使っている係数</h3><table class="bq-table"><tr><th>項目</th><th>値</th></tr>';
    for (const c of d.coefficients) {
      const name = coeffNameJa[c.coefficient_name] || c.coefficient_name;
      const val = Number(c.coefficient_value);
      const valStr = val >= 1 ? '¥' + Math.round(val).toLocaleString() : val.toFixed(2);
      const isWeight = c.coefficient_name.startsWith('weight_');
      const display = isWeight ? (val * 100).toFixed(0) + '%' : (c.coefficient_name === 'score_threshold' ? val.toFixed(2) : valStr);
      html += `<tr><td>${name}</td><td class="num">${display}</td></tr>`;
    }
    html += '</table></div>';
  }

  return html;
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// Init
// ============================================================
window.addEventListener('DOMContentLoaded', () => {
  startFirebasePolling();
  renderDashboard();
  fetchDashboard();
  // Refresh dashboard periodically
  setInterval(fetchDashboard, 30000);
  renderYtHistory();

  // Load YouTube IFrame API
  const tag = document.createElement('script');
  tag.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(tag);

  // YT search on Enter
  document.getElementById('yt-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      const val = e.target.value.trim();
      const videoId = extractYtVideoId(val);
      if (videoId) { playYtVideo(videoId, val); } else { ytSearch(); }
    }
  });

  // Resume AudioContext + init YT player on first tap (iOS autoplay unlock)
  document.addEventListener('touchstart', () => {
    if (window._audioCtx && window._audioCtx.state === 'suspended') window._audioCtx.resume();
    tryPlayKeepalive();
  }, { once: true });

  log('KITT v2.4 initialized');
  // Restore from cloud if local storage is empty
  if (!config.geminiApiKey) {
    restoreFromCloud().then(ok => { if (ok) log('Settings restored from cloud'); });
  }

  // Auto-connect Gemini (no tap needed)
  if (config.geminiApiKey) { setTimeout(() => connectGemini(), 1500); }
  updateGeminiUI();
});

// Visibility change â reconnect Gemini on foreground return
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') {
    log('App foregrounded');
    // Reconnect if WS died while in background
    if (!state.geminiConnected && state.geminiWs && state.geminiWs.readyState !== WebSocket.OPEN) {
      log('Gemini WS dead, reconnecting...');
      state.geminiWs = null;
      connectGemini();
    }
    // Also reconnect if no WS at all and we have API key
    if (!state.geminiConnected && !state.geminiConnecting && !state.geminiWs && config.geminiApiKey) {
      log('Gemini not connected, auto-reconnecting...');
      connectGemini();
    }
    // Resume AudioContext
    if (window._audioCtx && window._audioCtx.state === 'suspended') window._audioCtx.resume();
    // Check for missed offers
    pollFirebase();
    // Auto-restart mic on foreground
    if (state.geminiConnected && !state.micActive) { setTimeout(() => startMic(), 300); }
    // Resume YouTube playback if it was playing before background
    if (state.ytPlayer && state.ytReady && state._ytWasPlaying && state._ytLastVideoId) {
      setTimeout(() => {
        try {
          state.ytPlayer.loadVideoById(state._ytLastVideoId, state._ytLastTime || 0);
          state.ytPlayer.setVolume(config.normalVolume);
          log('YT resumed');
        } catch(e) { log('YT resume error: ' + e.message); }
      }, 500);
    }
  } else {
    // Going to background: remember YouTube state
    state._ytWasPlaying = state.ytPlaying;
    if (state.ytPlayer && state.ytReady) {
      try {
        state._ytLastVideoId = state.ytPlayer.getVideoData()?.video_id || '';
        state._ytLastTime = state.ytPlayer.getCurrentTime() || 0;
      } catch(e) {}
    }
  }
});
