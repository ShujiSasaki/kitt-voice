<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ぐるぐる3者会議</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: { extend: { colors: {
    'actor-shuji':     '#00B900',
    'actor-gpt':       '#10A37F',
    'actor-gemini':    '#8E75D9',
    'actor-claude':    '#D97706',
    'actor-validator': '#DC2626',
    'lineBg':          '#7FBBE3',
    'shujiBubble':     '#85E649',
  }}}
};
</script>
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<link rel="stylesheet" href="/style.css">
</head>
<body class="bg-gray-100 min-h-screen font-sans antialiased">
<div class="flex h-screen">

  <aside id="sidebar" class="w-20 bg-gray-900 flex flex-col items-center py-3 gap-3 overflow-y-auto flex-shrink-0">
  </aside>

  <div class="flex-1 flex flex-col bg-lineBg overflow-hidden">

    <header class="sticky top-0 z-20 bg-white shadow-sm">
      <div class="flex items-center gap-3 px-4 py-3 border-b flex-wrap">
        <h1 class="text-base font-bold text-gray-800" id="active-room-title">会議</h1>
        <div class="flex items-center gap-2 text-xs text-gray-600">
          <span>状態: <strong id="status-current" class="text-gray-900">発言待ち</strong></span>
          <span>次: <strong id="next-actor" class="text-gray-900">-</strong></span>
        </div>
        <div class="flex items-center gap-2 text-xs">
          <span class="text-gray-600">進行:</span>
          <span id="dot-gpt"     class="w-3 h-3 rounded-full bg-gray-300" title="GPT"></span>
          <span id="dot-gemini"  class="w-3 h-3 rounded-full bg-gray-300" title="Gemini"></span>
          <span id="dot-claude"  class="w-3 h-3 rounded-full bg-gray-300" title="Claude"></span>
          <span><strong id="loop-progress">0</strong>巡目</span>
        </div>
        <div class="ml-auto flex gap-2 text-xs">
          <span>合意: <strong id="consensus-status" class="text-red-600">未成立</strong></span>
          <select id="notify-level" class="bg-gray-100 border rounded px-2 py-1">
            <option value="off">通知OFF</option>
            <option value="normal" selected>NORMAL</option>
            <option value="strict">STRICT</option>
          </select>
        </div>
      </div>
    </header>

    <main id="timeline" class="flex-1 overflow-y-auto px-3 py-4 space-y-3">
      <div class="text-center text-gray-500 text-sm py-12" id="empty-hint">
        左サイドバーから会議を選択してください
      </div>
    </main>

    <footer class="sticky bottom-0 bg-white border-t shadow-lg z-10">
      <div class="flex items-end gap-2 p-3">
        <textarea id="shuji-input"
                  class="flex-1 min-h-[44px] max-h-32 px-3 py-2 border border-gray-300 rounded-2xl
                         text-sm focus:outline-none focus:ring-2 focus:ring-actor-shuji resize-none"
                  placeholder="この会議へ発言... (Cmd+Enter送信)"></textarea>
        <button id="submit-btn"
                class="bg-actor-shuji text-white font-bold px-5 py-2 rounded-2xl shadow
                       hover:opacity-90 disabled:bg-gray-300 disabled:cursor-not-allowed">
          送信
        </button>
        <button id="interrupt-btn"
                class="bg-actor-validator text-white text-xs px-3 py-2 rounded-2xl shadow"
                title="AI処理を強制中断">
          割込
        </button>
      </div>
    </footer>

  </div>
</div>

<template id="tmpl-room-icon">
  <button class="room-icon-btn relative group" data-room-id="">
    <div class="room-icon-shape w-12 h-12 rounded-full text-white text-xl font-bold flex items-center
                justify-center ring-2 ring-gray-700 hover:ring-white hover:rounded-2xl transition-all">
      <span class="room-icon-glyph"></span>
    </div>
    <span class="unread-badge hidden absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-bold
                 rounded-full w-5 h-5 flex items-center justify-center shadow">0</span>
    <span class="status-dot absolute -bottom-1 -right-1 w-3.5 h-3.5 rounded-full bg-gray-500
                 ring-2 ring-gray-900" title=""></span>
    <span class="tooltip absolute left-full ml-3 top-1/2 -translate-y-1/2 bg-black text-white
                 text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 whitespace-nowrap
                 z-50 pointer-events-none"></span>
  </button>
</template>

<template id="tmpl-msg">
  <article class="msg flex items-start gap-2" data-actor="" data-msg-id="">
    <div class="msg-avatar flex-shrink-0 w-10 h-10 rounded-full text-white font-bold
                flex items-center justify-center text-xs"></div>
    <div class="flex-1 max-w-[80%]">
      <div class="flex items-center gap-2 mb-1 flex-wrap msg-header-row">
        <span class="msg-actor text-xs text-gray-700 font-semibold"></span>
        <span class="msg-ts text-[10px] text-gray-500"></span>
        <span class="msg-validator text-[10px] px-1.5 py-0.5 rounded"></span>
        <span class="msg-loop text-[10px] bg-blue-100 text-blue-700 px-1.5 py-0.5 rounded"></span>
        <span class="msg-read text-[10px] text-gray-400"></span>
      </div>
      <div class="msg-bubble bg-white rounded-2xl shadow-sm px-4 py-3">
        <div class="msg-body prose prose-sm max-w-none text-gray-800 text-sm"></div>
        <details class="mt-3 border-t pt-2">
          <summary class="text-xs text-gray-500 cursor-pointer hover:text-gray-800 select-none">
            ▼ 原文・証跡を表示
          </summary>
          <div class="mt-2 space-y-2">
            <div>
              <div class="text-[10px] uppercase text-gray-500 mb-1">① 原文 (verbatim)</div>
              <pre class="raw-markdown bg-gray-50 p-2 rounded text-[11px] overflow-x-auto max-h-60"><code></code></pre>
            </div>
            <div>
              <div class="text-[10px] uppercase text-gray-500 mb-1">② Validator 7項目</div>
              <pre class="validator-log bg-gray-50 p-2 rounded text-[11px] overflow-x-auto"><code></code></pre>
            </div>
            <div>
              <div class="text-[10px] uppercase text-gray-500 mb-1">③ 末尾タグ</div>
              <pre class="tag-list bg-gray-50 p-2 rounded text-[11px] overflow-x-auto"><code></code></pre>
            </div>
          </div>
        </details>
        <button class="thread-btn mt-2 text-xs text-blue-600 hover:underline select-none hidden"
                aria-expanded="false">
          💬 監査ログをスレッドとして表示 <span class="thread-count text-gray-500"></span>
        </button>
        <div class="thread-container hidden mt-3 border-l-2 border-gray-200 pl-3 space-y-3"></div>
      </div>
    </div>
  </article>
</template>

<script src="/app.js"></script>
</body>
</html>
