<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com; connect-src 'self'; img-src 'self' data:; font-src 'self' data:; manifest-src 'self';">
<title>ぐるぐる3者会議</title>
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" sizes="192x192" href="/apple-touch-icon-192.png">
<link rel="apple-touch-icon" sizes="512x512" href="/apple-touch-icon-512.png">
<meta name="theme-color" content="#00B900">
<meta name="theme-color" content="#111111" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#F4F4F5" media="(prefers-color-scheme: light)">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="3者会議">
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: { extend: { colors: {
    'dm-bg':           'var(--c-bg)',
    'dm-header':       'var(--c-header)',
    'dm-bubble-ai':    'var(--c-bubble-ai)',
    'dm-bubble-shuji': '#6DE67B',
    'dm-input':        'var(--c-input)',
    'dm-text':         'var(--c-text)',
    'dm-text-dim':     'var(--c-text-dim)',
    'dm-border':       'var(--c-border)',
    'actor-shuji':     '#00B900',
    'actor-gpt':       '#10A37F',
    'actor-gemini':    '#8E75D9',
    'actor-claude':    '#D97706',
    'actor-validator': '#DC2626'
  }}}
};
</script>
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<link rel="stylesheet" href="/style.css?v=r77">
</head>
<body class="bg-dm-bg text-dm-text min-h-screen font-sans antialiased">
<div class="flex h-screen">

  <aside id="sidebar" class="w-12 bg-dm-header flex flex-col items-center py-2 gap-2 overflow-y-auto flex-shrink-0 border-r border-dm-border">
  </aside>

  <div class="flex-1 flex flex-col bg-dm-bg overflow-hidden min-w-0">

    <header class="sticky top-0 z-20 bg-dm-header border-b border-dm-border">
      <div class="flex items-center gap-2 px-3 py-3 min-w-0">
        <button id="room-list-btn" class="icon-btn text-dm-text-dim hover:text-dm-text flex-shrink-0" aria-label="会議室一覧" title="会議室一覧"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg></button>
        <h1 class="text-base font-semibold text-dm-text truncate min-w-0 flex-1" id="active-room-title">会議</h1>
        <span id="relay-lamp" class="w-2.5 h-2.5 rounded-full bg-dm-text-dim flex-shrink-0" title="relay_worker: off" aria-label="relay状態"></span>
        <div class="ml-auto flex items-center gap-2 flex-shrink-0">
          <select id="notify-level" class="text-xs bg-dm-input border border-dm-border text-dm-text rounded-full px-2 py-1">
            <option value="off">通知OFF</option>
            <option value="normal" selected>NORMAL</option>
            <option value="strict">STRICT</option>
          </select>
          <button id="theme-btn" class="icon-btn text-dm-text-dim hover:text-dm-text flex-shrink-0" aria-label="テーマ切替" title="テーマ: auto"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/></svg></button>
          <button id="search-btn" class="icon-btn text-dm-text-dim hover:text-dm-text flex-shrink-0" aria-label="検索" title="検索とフィルタ"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.5-4.5"/></svg></button>
          <button id="jump-summary-btn" class="icon-btn text-dm-text-dim hover:text-dm-text flex-shrink-0" aria-label="最新の合意まとめへ" title="最新の合意まとめへジャンプ"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="3" width="14" height="18" rx="2"/><path d="M9 8h6M9 12h6M9 16h4"/></svg></button>
          <button id="ai-growth-btn" class="icon-btn text-dm-text-dim hover:text-dm-text flex-shrink-0" aria-label="AI育成リング" title="🤖 AI育成リング状況">🤖</button>
          <button id="header-settings-btn" class="icon-btn text-dm-text-dim hover:text-dm-text flex-shrink-0" aria-label="設定" title="詳細を畳む/開く"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 8h10M18 8h2M4 16h2M10 16h10"/><circle cx="16" cy="8" r="2"/><circle cx="8" cy="16" r="2"/></svg></button>
        </div>
      </div>
      <div class="px-3 pb-1 text-xs text-dm-text-dim truncate" id="header-status-summary">— 待機中</div>
      <!-- AI育成リング モーダル (🤖 ボタンで開閉) -->
      <div id="ai-growth-modal" class="hidden fixed inset-0 z-30 bg-black/70 flex items-start justify-center pt-6 overflow-y-auto" onclick="if(event.target===this)this.classList.add('hidden')">
        <div class="bg-dm-bg border border-dm-border rounded-lg max-w-md w-[95%] p-4 m-3" onclick="event.stopPropagation()">
          <div class="flex justify-between items-center mb-3">
            <h2 class="text-base font-bold text-dm-text">🤖 AI育成リング</h2>
            <button onclick="document.getElementById('ai-growth-modal').classList.add('hidden')" class="text-dm-text-dim hover:text-dm-text text-xl">✕</button>
          </div>
          <div id="ai-growth-content" class="text-sm text-dm-text space-y-2">読み込み中…</div>
          <button id="ai-growth-refresh" class="mt-3 w-full py-2 bg-dm-header border border-dm-border rounded text-xs text-dm-text-dim hover:text-dm-text">🔄 再読み込み</button>
        </div>
      </div>
      <div class="px-3 pb-1 text-[11px] text-dm-text-dim truncate flex items-center gap-1.5" id="global-relay-status">
        <span id="grs-dot" class="inline-block w-2 h-2 rounded-full bg-dm-text-dim flex-shrink-0"></span>
        <span id="grs-text" class="truncate"></span>
      </div>
      <div id="search-bar" class="hidden px-3 pb-2 flex items-center gap-1.5 flex-wrap">
        <input id="search-input" type="search" placeholder="この部屋を検索..."
               class="flex-1 min-w-[140px] text-sm bg-dm-input border border-dm-border text-dm-text
                      rounded-full px-3 py-1 focus:outline-none">
        <div id="actor-filters" class="flex items-center gap-1 text-[11px]">
          <button data-filter="" class="filter-chip active">全部</button>
          <button data-filter="shuji" class="filter-chip">Shuji</button>
          <button data-filter="gpt" class="filter-chip">GPT</button>
          <button data-filter="gemini" class="filter-chip">Gemini</button>
          <button data-filter="claude" class="filter-chip">Claude</button>
          <button data-filter="validator" class="filter-chip">Sys</button>
        </div>
      </div>
      <details id="header-details" class="px-4 pb-2">
        <summary class="text-xs text-dm-text-dim cursor-pointer select-none hover:text-dm-text">▼ 状態詳細</summary>
        <div class="mt-2 flex flex-wrap items-center gap-3 text-xs text-dm-text-dim">
          <span>状態: <strong id="status-current" class="text-dm-text">発言待ち</strong></span>
          <span>次: <strong id="next-actor" class="text-dm-text">-</strong></span>
          <span class="flex items-center gap-1">
            進行:
            <span id="dot-gpt"     class="w-2.5 h-2.5 rounded-full bg-dm-border" title="GPT"></span>
            <span id="dot-gemini"  class="w-2.5 h-2.5 rounded-full bg-dm-border" title="Gemini"></span>
            <span id="dot-claude"  class="w-2.5 h-2.5 rounded-full bg-dm-border" title="Claude"></span>
          </span>
          <span><strong id="loop-progress">0</strong>巡目</span>
          <span>合意: <strong id="consensus-status" class="text-red-400">未成立</strong></span>
        </div>
      </details>
    </header>

    <main id="timeline" class="flex-1 overflow-y-auto px-3 py-4 flex flex-col gap-2">
      <div class="text-center text-dm-text-dim text-sm py-12" id="empty-hint">
        左サイドバーから会議を選択してください
      </div>
    </main>

    <div id="typing-indicator" class="hidden px-4 py-1.5 text-xs text-dm-text-dim flex items-center gap-2 bg-dm-bg">
      <span class="typing-avatar w-5 h-5 rounded-full flex-shrink-0 flex items-center justify-center
                   text-[8px] font-bold text-white"></span>
      <span class="typing-text"></span>
      <span class="typing-dots"><i></i><i></i><i></i></span>
    </div>

    <footer class="sticky bottom-0 bg-dm-header border-t border-dm-border z-10">
      <input type="file" id="file-input-camera" accept="image/*" capture="environment" class="hidden">
      <input type="file" id="file-input-library" accept="image/*" class="hidden">
      <div class="flex items-center gap-2 p-2 min-w-0">
        <div class="relative flex-shrink-0">
          <button id="composer-add-btn" class="composer-icon-btn" title="添付" aria-label="添付" aria-expanded="false">＋</button>
          <div id="composer-add-popup" class="composer-popup hidden" role="menu" aria-labelledby="composer-add-btn">
            <button id="composer-camera-btn" class="composer-popup-item" role="menuitem" aria-label="撮影">
              <span class="composer-popup-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg></span><span>撮影</span>
            </button>
            <button id="composer-image-btn" class="composer-popup-item" role="menuitem" aria-label="画像を選択">
              <span class="composer-popup-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg></span><span>画像を選択</span>
            </button>
          </div>
        </div>
        <textarea id="shuji-input"
                  class="composer-textarea flex-1 min-w-0 min-h-[40px] max-h-32 px-3 py-2 bg-dm-input border border-dm-border
                         text-dm-text rounded-2xl text-sm placeholder-dm-text-dim
                         focus:outline-none focus:ring-2 focus:ring-dm-bubble-shuji resize-none"
                  placeholder="メッセージを入力..." rows="1"></textarea>
        <button id="submit-btn"
                class="bg-dm-bubble-shuji text-black font-bold w-10 h-10 rounded-full shadow
                       hover:opacity-90 disabled:bg-dm-border disabled:text-dm-text-dim disabled:cursor-not-allowed
                       flex items-center justify-center flex-shrink-0"
                title="送信" aria-label="送信"><svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg></button>
      </div>
      <div class="flex items-center px-2 pb-2 min-w-0 composer-extras">
        <button id="interrupt-btn"
                class="ml-auto bg-actor-validator text-white text-[11px] px-2 py-1 rounded-full shadow flex-shrink-0"
                title="AI処理を強制中断" aria-label="割込"><svg viewBox="0 0 24 24" fill="currentColor" width="11" height="11" class="inline-block mr-0.5 -mt-0.5"><rect x="6" y="6" width="12" height="12" rx="1.5"/></svg>割込</button>
      </div>
    </footer>

  </div>
</div>

<div id="room-list-panel" class="hidden fixed inset-0 z-40 bg-dm-bg flex flex-col">
  <div class="flex items-center gap-2 px-4 py-3 border-b border-dm-border bg-dm-header"
       style="padding-top: max(env(safe-area-inset-top, 0px), 12px);">
    <h2 class="text-base font-semibold text-dm-text flex-1">会議室</h2>
    <button id="room-list-close" class="text-dm-text-dim text-xl px-2" aria-label="閉じる">✕</button>
  </div>
  <div id="room-list-items" class="flex-1 overflow-y-auto"></div>
</div>

<template id="tmpl-room-row">
  <button class="room-row w-full flex items-center gap-3 px-4 py-3 border-b border-dm-border text-left active:bg-white/5">
    <span class="room-row-icon w-11 h-11 rounded-full flex items-center justify-center text-lg flex-shrink-0 text-white font-bold shadow"></span>
    <span class="flex-1 min-w-0">
      <span class="flex items-center gap-1.5 min-w-0">
        <span class="room-row-title text-sm font-semibold text-dm-text truncate"></span>
        <span class="room-row-status text-[9px] px-1 py-0.5 rounded font-bold flex-shrink-0"></span>
        <span class="room-row-time ml-auto text-[10px] text-dm-text-dim flex-shrink-0"></span>
      </span>
      <span class="room-row-preview block text-xs text-dm-text-dim truncate mt-0.5"></span>
    </span>
    <span class="room-row-unread hidden bg-red-500 text-white text-[10px] font-bold rounded-full
                 min-w-[18px] h-[18px] px-1 flex items-center justify-center flex-shrink-0"></span>
  </button>
</template>

<template id="tmpl-room-icon">
  <button class="room-icon-btn relative group" data-room-id="">
    <div class="room-icon-shape w-8 h-8 rounded-lg text-white text-sm font-bold flex items-center
                justify-center hover:rounded-md transition-all">
      <span class="room-icon-glyph"></span>
    </div>
    <span class="unread-badge hidden absolute -top-0.5 -right-0.5 bg-red-500 text-white text-[9px] font-bold
                 rounded-full w-4 h-4 flex items-center justify-center shadow">0</span>
    <span class="processing-badge hidden absolute -top-1.5 -left-1.5 z-10 bg-amber-400 text-black
                 text-[8px] font-bold px-0.5 rounded shadow whitespace-nowrap">リレー中</span>
    <span class="maxloops-badge hidden absolute -bottom-1.5 -left-1.5 z-10 bg-red-500 text-white
                 text-[8px] font-bold px-0.5 rounded shadow whitespace-nowrap">上限</span>
    <span class="queued-badge hidden absolute -top-1.5 -left-1.5 z-10 bg-sky-600 text-white
                 text-[8px] font-bold px-0.5 rounded shadow whitespace-nowrap">待機</span>
    <span class="status-dot absolute -bottom-0.5 -right-0.5 w-2 h-2 rounded-full bg-dm-text-dim
                 ring-1 ring-dm-header" title=""></span>
    <span class="tooltip absolute left-full ml-2 top-1/2 -translate-y-1/2 bg-dm-input text-dm-text
                 text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 whitespace-nowrap
                 z-50 pointer-events-none border border-dm-border"></span>
  </button>
</template>

<template id="tmpl-msg">
  <article class="msg flex flex-col gap-0.5 max-w-full" data-actor="" data-msg-id="">
    <div class="msg-sender-label text-[11px] text-dm-text-dim opacity-60 px-1"></div>
    <div class="msg-row flex items-end gap-1.5 max-w-full">
    <span class="msg-avatar w-7 h-7 rounded-full flex-shrink-0 flex items-center justify-center
                 text-[10px] font-bold text-white select-none shadow"></span>
    <div class="msg-bubble rounded-3xl px-4 py-3 shadow-sm max-w-[75%]">
      <div class="msg-body text-sm leading-relaxed break-words"></div>
      <details class="msg-evidence mt-2 border-t border-white/10 pt-1.5">
        <summary class="text-[10px] opacity-60 cursor-pointer hover:opacity-100 select-none">▼ 証跡</summary>
        <div class="mt-1.5 space-y-1.5">
          <div>
            <div class="text-[9px] uppercase opacity-50 mb-0.5">① 原文</div>
            <pre class="raw-markdown bg-black/30 p-1.5 rounded text-[10px] overflow-x-auto max-h-48"><code></code></pre>
          </div>
          <div>
            <div class="text-[9px] uppercase opacity-50 mb-0.5">② Validator</div>
            <pre class="validator-log bg-black/30 p-1.5 rounded text-[10px] overflow-x-auto"><code></code></pre>
          </div>
          <div>
            <div class="text-[9px] uppercase opacity-50 mb-0.5">③ 末尾タグ</div>
            <pre class="tag-list bg-black/30 p-1.5 rounded text-[10px] overflow-x-auto"><code></code></pre>
          </div>
        </div>
      </details>
      <button class="thread-btn mt-1.5 text-[11px] opacity-70 hover:opacity-100 select-none hidden"
              aria-expanded="false">
        💬 監査ログ <span class="thread-count opacity-60"></span>
      </button>
      <div class="thread-container hidden mt-2 border-l-2 border-white/20 pl-2 space-y-2"></div>
    </div>
    </div>
    <div class="msg-meta-bottom flex items-center gap-2 mt-0.5 px-1 text-[10px] text-dm-text-dim">
      <span class="msg-ts"></span>
      <span class="msg-validator px-1.5 py-0.5 rounded text-[9px]"></span>
      <span class="msg-loop text-[9px]"></span>
      <span class="msg-read text-[9px]"></span>
    </div>
  </article>
</template>

<template id="tmpl-date-sep">
  <div class="date-separator flex items-center gap-3 my-4 text-[11px] text-dm-text-dim opacity-50">
    <div class="flex-1 border-t border-dm-border"></div>
    <span class="date-label font-semibold"></span>
    <div class="flex-1 border-t border-dm-border"></div>
  </div>
</template>

<script src="/app.js?v=r77"></script>
</body>
</html>
